      SAO_APPROVED:    { id: "SAO_APPROVED",    label: "SAO स्वीकृत",   icon: "✔️", color: "#10b981", bg: "#d1fae5" },
      SAO_RETURNED:    { id: "SAO_RETURNED",    label: "SAO ने वापस किया",icon: "↩️", color: "#f97316", bg: "#fff7ed" },
      SUBMITTED:       { id: "SUBMITTED",       label: "हिंदी प्रकोष्ठ स्वीकृत", icon: "🎉", color: "#16a34a", bg: "#dcfce7" },
      REJECTED:        { id: "REJECTED",        label: "अस्वीकृत",        icon: "❌", color: "#dc2626", bg: "#fee2e2" },

    const SECTIONS_LIST = [

    const QUARTERS = [{ id: "Q1", label: "Q1 · अप्रैल–जून" },{ id: "Q2", label: "Q2 · जुलाई–सितंबर" },{ id: "Q3", label: "Q3 · अक्टूबर–दिसंबर" },{ id: "Q4", label: "Q4 · जनवरी–मार्च" }];
    const YEARS = ["2022","2023","2024","2025","2026","2027","2028","2029","2030"];
    const SECTION_COLORS = [{ bg:"#ede9fe", border:"#8b5cf6", text:"#5b21b6", icon:"📜" },{ bg:"#fce7f3", border:"#ec4899", text:"#9d174d", icon:"🏛️" },{ bg:"#fee2e2", border:"#ef4444", text:"#991b1b", icon:"📄" },{ bg:"#fff7ed", border:"#f97316", text:"#9a3412", icon:"📬" },{ bg:"#fefce8", border:"#eab308", text:"#854d0e", icon:"✉️" },{ bg:"#f0fdf4", border:"#22c55e", text:"#166534", icon:"📨" },{ bg:"#ecfeff", border:"#06b6d4", text:"#155e75", icon:"🗂️" },{ bg:"#eff6ff", border:"#3b82f6", text:"#1e40af", icon:"🎓" },{ bg:"#f0fdf4", border:"#10b981", text:"#065f46", icon:"🤝" },{ bg:"#fdf4ff", border:"#a855f7", text:"#581c87", icon:"📝" },{ bg:"#fff1f2", border:"#f43f5e", text:"#881337", icon:"🏆" },{ bg:"#f8fafc", border:"#64748b", text:"#0f172a", icon:"✅" }];

    function genId() { return `RAJ-${Date.now().toString(36).toUpperCase().slice(-7)}`; }

    function emptyForm() {
      return {
        officeNameAddress:"", officerName:"", stdCode:"", phone:"", email:"", year:"2025", quarter:"Q1", region:"A", ackId: genId(), rbOfficerPhone:"", rbOfficerEmail:"",
        b1_s1_totalFiles:"", b1_s1_hindiFiles:"", b1_s2_totalMeetings:"", b1_s2_hindiMinutes:"", b1_s2_totalDocs:"", b1_s2_hindiDocs:"",
        b1_s3_totalIssued:"", b1_s3_bilingual:"", b1_s3_englishOnly:"", b1_s3_hindiOnly:"", b1_s4_totalReceived:"", b1_s4_noReplyNeeded:"", b1_s4_hindiReply:"", b1_s4_englishReply:"",
        b1_s5_ka_total:"", b1_s5_ka_hindiReply:"", b1_s5_ka_engReply:"", b1_s5_ka_noReply:"", b1_s5_kha_total:"", b1_s5_kha_hindiReply:"", b1_s5_kha_engReply:"", b1_s5_kha_noReply:"",

        b1_s7_hindiPages:"", b1_s7_engPages:"", b1_s7_totalPages:"", b1_s7_eoffice:"", b1_s8_workshops:"", b1_s8_officers:"", b1_s8_staff:"",
        b1_s9_meetingDate:"", b1_s9_subOfficeCmtes:"", b1_s9_subOfficeMeetings:"", b1_s9_agendaHindi:"नहीं", b1_s10_meetingDate:"", b1_s11_innovation:"", b1_s11_special:"", b1_s11_other:"",
        b2_s1_notified:"नहीं", b2_s1_subOfficesTotal:"", b2_s1_subOfficesNotified:"", b2_s1_subOfficesAction:"",
        b2_s2_off_total:"", b2_s2_off_ministerial:"", b2_s2_off_pravinta:"", b2_s2_off_karyasadhak:"", b2_s2_off_training:"", b2_s2_off_remaining:"",
        b2_s2_staff_total:"", b2_s2_staff_ministerial:"", b2_s2_staff_pravinta:"", b2_s2_staff_karyasadhak:"", b2_s2_staff_training:"", b2_s2_staff_remaining:"",
        b2_shorthand_total:"", b2_shorthand_trained:"", b2_shorthand_working:"", b2_shorthand_pending:"", b2_typing_total:"", b2_typing_trained:"", b2_typing_working:"", b2_typing_pending:"",
        b2_tax_total:"", b2_tax_trained:"", b2_tax_working:"", b2_tax_pending:"", b2_translation_total:"", b2_translation_trained:"", b2_translation_pending:"", 
        b2_comp_total:"", b2_comp_trained:"", b2_comp_working:"", b2_s4_totalLaptops:"", b2_s4_unicode:"", b2_s4_hindiPct:"",
        b2_s5_manualsTotal:"", b2_s5_manualsBilingual:"", b2_s5_formsTotal:"", b2_s5_formsBilingual:"", b2_rule84_ordered:"", b2_rule84_pending:"", 
        b2_s7_name:"", b2_s7_duration:"", b2_s7_hindi:"", b2_s7_eng:"", b2_s7_mixed:"",
        b2_inspection_sections_total:"", b2_inspection_sections_inspected:"", b2_s8_hindiSections:"", b2_inspection_offices_total:"", b2_inspection_offices_inspected:"", 
        b2_publications_total:"", b2_publications_hindi:"", b2_publications_eng:"", b2_books_expenditure:"", b2_books_hindiExpenditure:"", 
        b11_ds_total:"", b11_ds_knowHindi:"", b11_ds_notDoing:"", b11_ds_25:"", b11_ds_50:"", b11_ds_75:"", b11_ds_more:"", b11_ds_100:"",
        b12_bl_total:"", b12_bl_knowHindi:"", b12_bl_notDoing:"", b12_bl_25:"", b12_bl_50:"", b12_bl_75:"", b12_bl_more:"", b12_bl_100:"",
        b13_postName:"", b13_hqSanc:"", b13_hqVac:"", b13_subSanc:"", b13_subVac:"",
        b2_website_url:"", b2_website_type:"केवल अंग्रेजी", b2_website_langOption:"नहीं",
        b2_hindi_diwas:"", b2_hindi_sangoshti:"", b2_other_programs:"", b2_innovation:"", b2_narakas:"नहीं", b2_narakas_lastMeeting:"", b2_narakas_participation:"नहीं",
      };
    }

    const Inp = ({ label, value, onChange, type="text", placeholder="" }) => (
      <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
        {label && <label style={{ fontSize:11, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:"0.04em" }}>{label}</label>}
        <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{ padding:"8px 12px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:13, outline:"none", boxSizing:"border-box", width:"100%" }} onFocus={e=>e.target.style.borderColor="#6366f1"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
      </div>
    );
    const Num = ({ label, value, onChange }) => (
      <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
        {label && <label style={{ fontSize:11, fontWeight:700, color:"#475569", lineHeight:1.3 }}>{label}</label>}
        <input type="number" min={0} value={value} onChange={e=>onChange(e.target.value)} style={{ padding:"7px 10px", borderRadius:7, border:"1.5px solid #e2e8f0", fontSize:13, fontWeight:600, color:"#1e293b", width:"100%", boxSizing:"border-box" }} onFocus={e=>e.target.style.borderColor="#6366f1"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
      </div>
    );
    const Radio = ({ label, value, onChange, options }) => (
      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
        {label && <label style={{ fontSize:11, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:"0.04em" }}>{label}</label>}
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          {options.map(o=>(<button key={o} onClick={()=>onChange(o)} style={{ padding:"5px 14px", borderRadius:20, fontSize:12, fontWeight:600, cursor:"pointer", border:"1.5px solid", borderColor: value===o?"#6366f1":"#e2e8f0", background: value===o?"#6366f1":"#fff", color: value===o?"#fff":"#475569", }}>{o}</button>))}
        </div>
      </div>
    );
    const Grid = ({ cols=2, children }) => (<div style={{ display:"grid", gridTemplateColumns:`repeat(${cols},1fr)`, gap:12 }}>{children}</div>);
    const SecCard = ({ title, icon, color, children }) => {
      const [open, setOpen] = useState(true);
      return (
        <div className="print-box" style={{ borderRadius:14, border:`2px solid ${color.border}`, overflow:"hidden", marginBottom:14, boxShadow:"0 2px 10px rgba(0,0,0,0.05)" }}>
          <div className="no-print" onClick={()=>setOpen(o=>!o)} style={{ background:color.bg, padding:"12px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", cursor:"pointer", userSelect:"none" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}><span style={{ fontSize:20 }}>{icon}</span><span style={{ fontSize:13, fontWeight:700, color:color.text }}>{title}</span></div>
            <span style={{ color:color.text, transform: open?"rotate(180deg)":"rotate(0)", display:"inline-block", transition:"transform 0.2s" }}>▾</span>
          </div>
          <div style={{ display:"none", padding:"10px", background:"#f1f5f9", fontWeight:"bold", borderBottom:"1px solid #ccc" }} className="print-only-header">{title}</div>
          {open && <div style={{ background:"#fff", padding:18 }}>{children}</div>}
        </div>
      );
    };
    const TblInput = ({ headers, rows, data, onChange }) => (
      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead><tr>{headers.map((h,i)=><th key={i} style={{ padding:"7px 8px", background:"#f8fafc", border:"1px solid #e2e8f0", fontSize:10, fontWeight:700, color:"#475569", textAlign:"center" }}>{h}</th>)}</tr></thead>
          <tbody>{rows.map((row,ri)=>(
            <tr key={ri}>{row.map((cell,ci)=>(
              <td key={ci} style={{ border:"1px solid #e2e8f0", padding:3 }}>
                {cell.key ? <input type={cell.type||"number"} min={0} value={data[cell.key]||""} onChange={e=>onChange(cell.key,e.target.value)} style={{ width:"100%", padding:"5px 6px", border:"none", fontSize:13, fontWeight:600, textAlign:"center", background:"transparent", outline:"none" }} /> : <span style={{ padding:"5px 8px", display:"block", color:"#64748b", fontWeight:600 }}>{cell.label}</span>}
              </td>
            ))}</tr>
          ))}</tbody>
        </table>
      </div>
    );

    function WorkflowPipeline({ currentRole }) {
      const steps = [{ role:"SECTION", label:"अनुभाग", icon:"🏢" }, { role:"AAO", label:"AAO", icon:"🔎" }, { role:"SAO", label:"SAO", icon:"✅" }, { role:"HINDI_CELL", label:"हिंदी प्रकोष्ठ", icon:"🏛️" }];
      const currentIdx = ["SECTION","AAO","SAO","HINDI_CELL"].indexOf(currentRole);
      return (
        <div style={{ display:"flex", alignItems:"center", gap:0, padding:"10px 0" }}>
          {steps.map((s,i)=>{
            const active = s.role === currentRole; const done = i < currentIdx; const r = ROLES[s.role];
            return (
              <div key={s.role} style={{ display:"flex", alignItems:"center", flex:1 }}>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", flex:1, gap:4 }}>
                  <div style={{ width:40, height:40, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, border:"2.5px solid", background: active ? r.color : done ? "#d1fae5" : "#f1f5f9", borderColor: active ? r.color : done ? "#10b981" : "#e2e8f0", boxShadow: active ? `0 0 0 4px ${r.color}30` : "none", transition:"all 0.3s", }}>{done ? "✓" : s.icon}</div>
                  <span style={{ fontSize:10, fontWeight: active?700:400, color: active?r.color : done?"#10b981":"#94a3b8", textAlign:"center" }}>{s.label}</span>
                </div>
                {i < steps.length-1 && (<div style={{ height:3, flex:0.4, background: i<currentIdx?"#10b981":"#e2e8f0", borderRadius:2, transition:"background 0.3s" }} />)}
              </div>
            );
          })}
        </div>
      );
    }

    function LoginScreen({ onLogin }) {
      const [step, setStep]       = useState("choice");
      const [section, setSection] = useState("");
      const [pass, setPass]       = useState("");
      const [err, setErr]         = useState("");

      const roleCards = [
        { role:"SECTION",    step:"section", desc:"रिपोर्ट भरें और AAO को भेजें" },
        { role:"AAO",        step:"aao",     desc:"अनुभाग की रिपोर्ट जाँचें और SAO को भेजें" },
        { role:"SAO",        step:"sao",     desc:"AAO की अनुशंसा स्वीकृत करें और आगे भेजें" },
        { role:"HINDI_CELL", step:"hindi",   desc:"SAO से आई रिपोर्ट अंतिम रूप से स्वीकार करें" },
      ];

      const tryLogin = (role, name) => {
        const pw = PASSWORDS[role];
        if (pw && pass !== pw) { setErr("❌ गलत पासवर्ड"); return; }
        
        if (role === "AAO" || role === "SAO") {
           if (!section) { setErr("❌ कृपया अपना अनुभाग चुनें"); return; }
           onLogin({ role: role, name: `${role}-${section}`, mappedSection: section });
        } else if (role === "HINDI_CELL") {
           onLogin({ role: role, name: "हिंदी प्रकोष्ठ", mappedSection: "ALL" });
        } else {
           onLogin({ role: role, name: name, mappedSection: name });
        }
      };

      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#1e1b4b 0%,#312e81 40%,#4c1d95 70%,#7c3aed 100%)", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div style={{ width:"100%", maxWidth:480 }}>
            <div style={{ textAlign:"center", marginBottom:28 }}>
              <div style={{ fontSize:54, marginBottom:10 }}>🏛️</div>
              <h1 style={{ fontSize:26, fontWeight:800, color:"#fff", margin:"0 0 4px", letterSpacing:"-0.5px" }}>राजभाषा पोर्टल</h1>
              <p style={{ fontSize:12, color:"rgba(255,255,255,0.65)", margin:0 }}>तिमाही प्रगति रिपोर्ट · अनुलग्नक-2</p>
            </div>
            <div style={{ background:"rgba(255,255,255,0.97)", borderRadius:24, padding:28, boxShadow:"0 24px 60px rgba(0,0,0,0.3)" }}>
              {step==="choice" && (
                <div>
                  <p style={{ fontSize:13, fontWeight:700, color:"#64748b", margin:"0 0 16px" }}>अपनी भूमिका चुनें:</p>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {roleCards.map(rc=>{
                      const r = ROLES[rc.role];
                      return (
                        <button key={rc.role} onClick={()=>{ setStep(rc.step); setErr(""); setPass(""); }} style={{ display:"flex", alignItems:"center", gap:14, padding:"14px 18px", borderRadius:14, border:"none", background:r.grad, color:"#fff", cursor:"pointer", textAlign:"left", boxShadow:"0 4px 14px rgba(0,0,0,0.12)", transition:"transform 0.15s" }}>
                          <span style={{ fontSize:30, flexShrink:0 }}>{r.icon}</span>
                          <div><div style={{ fontWeight:800, fontSize:15 }}>{r.label}</div><div style={{ fontSize:11, opacity:0.85, marginTop:2 }}>{rc.desc}</div></div>
                          <span style={{ marginLeft:"auto", fontSize:18, opacity:0.7 }}>→</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
              {step==="section" && (
                <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4 }}><span style={{ fontSize:28 }}>🏢</span><div><div style={{ fontSize:16, fontWeight:800, color:"#1e293b" }}>अनुभाग प्रवेश</div></div></div>
                  <div>
                    <select value={section} onChange={e=>{setSection(e.target.value); setErr("");}} style={{ width:"100%", padding:"10px 14px", borderRadius:10, border:"1.5px solid #e2e8f0", fontSize:14, outline:"none" }}>
                      <option value="">-- अनुभाग चुनें --</option>
                      {SECTIONS_LIST.map(s=><option key={s}>{s}</option>)}
                    </select>
                  </div>
                  {err && <ErrBox msg={err} />}
                  <BtnPrimary grad={ROLES.SECTION.grad} onClick={()=>{ if(!section){setErr("❌ कृपया अनुभाग चुनें"); return;} onLogin({role:"SECTION",name:section}); }}>प्रवेश करें →</BtnPrimary>
                  <BackBtn onClick={()=>{setStep("choice"); setErr(""); setSection("");}} />
                </div>
              )}
              {step==="aao" && <PwdLogin role="AAO" pass={pass} setPass={setPass} err={err} setErr={setErr} section={section} setSection={setSection} onLogin={()=>tryLogin("AAO")} onBack={()=>{setStep("choice"); setPass(""); setErr(""); setSection("");}} />}
              {step==="sao" && <PwdLogin role="SAO" pass={pass} setPass={setPass} err={err} setErr={setErr} section={section} setSection={setSection} onLogin={()=>tryLogin("SAO")} onBack={()=>{setStep("choice"); setPass(""); setErr(""); setSection("");}} />}
              {step==="hindi" && <PwdLogin role="HINDI_CELL" pass={pass} setPass={setPass} err={err} setErr={setErr} section={section} setSection={setSection} onLogin={()=>tryLogin("HINDI_CELL")} onBack={()=>{setStep("choice"); setPass(""); setErr(""); setSection("");}} />}
            </div>
          </div>
        </div>

    function PwdLogin({ role, pass, setPass, err, setErr, onLogin, onBack, section, setSection }) {
      const r = ROLES[role];
      const needsSection = role === "AAO" || role === "SAO"; 
      return (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4 }}><span style={{ fontSize:28 }}>{r.icon}</span><div><div style={{ fontSize:16, fontWeight:800, color:"#1e293b" }}>{r.label} प्रवेश</div></div></div>
          {needsSection && (
            <div>
              <label style={{ fontSize:11, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:"0.04em", display:"block", marginBottom:6 }}>आप किस अनुभाग के {r.label} हैं?</label>
              <select value={section} onChange={e=>{setSection(e.target.value); setErr("");}} style={{ width:"100%", padding:"10px 14px", borderRadius:10, border:"1.5px solid #e2e8f0", fontSize:14, outline:"none", marginBottom:4 }}>
                <option value="">-- अपना अनुभाग चुनें --</option>
                {SECTIONS_LIST.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>

          {err && <ErrBox msg={err} />}
          <BtnPrimary grad={r.grad} onClick={onLogin}>लॉगिन करें →</BtnPrimary>
          <BackBtn onClick={onBack} />
        </div>
      );
    }
    function ErrBox({ msg }) { return <div style={{ fontSize:12, color:"#dc2626", background:"#fee2e2", padding:"8px 12px", borderRadius:8 }}>{msg}</div>; }
    function BtnPrimary({ grad, onClick, children }) { return <button onClick={onClick} style={{ padding:"12px 0", borderRadius:12, border:"none", cursor:"pointer", background:grad, color:"#fff", fontWeight:800, fontSize:14, boxShadow:"0 4px 14px rgba(0,0,0,0.15)" }}>{children}</button>; }
    function BackBtn({ onClick }) { return <button onClick={onClick} style={{ background:"none", border:"none", color:"#94a3b8", fontSize:12, cursor:"pointer" }}>← वापस</button>; }

    function Navbar({ user, view, setView, onLogout, refreshData }) {

                <span style={{ fontSize:15 }}>{t.icon}</span><span>{t.label}</span>
              </button>

            <button onClick={refreshData} style={{ display:"flex", alignItems:"center", gap:5, padding:"6px 12px", borderRadius:10, cursor:"pointer", fontSize:12, border:"1px solid rgba(255,255,255,0.3)", background:"transparent", color:"#fff" }}>

              <div style={{ display:"flex", gap:10, marginBottom:16 }}>

             <div>
               <label style={{fontSize:11, fontWeight:"bold", display:"block"}}>तिमाही चुनें</label>
               <select value={q} onChange={e=>setQ(e.target.value)} style={{padding:6, borderRadius:6, border:"1px solid #ccc", outline:"none"}}>{QUARTERS.map(x=><option key={x.id} value={x.id}>{x.label}</option>)}</select>
             </div>
             <div>
               <label style={{fontSize:11, fontWeight:"bold", display:"block"}}>वर्ष चुनें</label>
               <select value={y} onChange={e=>setY(e.target.value)} style={{padding:6, borderRadius:6, border:"1px solid #ccc", outline:"none"}}>{YEARS.map(x=><option key={x} value={x}>{x}</option>)}</select>
             </div>
          </div>

          <div className="print-box" style={{ background:"#fff", borderRadius:14, border:"1.5px solid #e2e8f0", padding:20 }}>
            <div style={{ textAlign:"center", marginBottom:20, borderBottom:"2px solid #1e293b", paddingBottom:10 }}>
               <h2 style={{ margin:0, fontSize:20, color:"#1e293b" }}>राजभाषा तिमाही प्रगति समेकित (Consolidated) रिपोर्ट</h2>
               <p style={{ margin:"4px 0 0", color:"#475569", fontSize:14 }}>{QUARTERS.find(x=>x.id===q)?.label} · {y} · पश्चिम रेलवे</p>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              {fieldsToShow.map(([k,v], i)=>(
                <div key={i} style={{ background:"#f8fafc", borderRadius:8, padding:"10px 14px", border:"1px solid #f1f5f9", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:12, color:"#475569", fontWeight:700 }}>{k}</span>
                  <span style={{ fontSize:15, color:"#1e293b", fontWeight:800 }}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function Inbox({ reports, user, onAction }) {
      const r = ROLES[user.role];
      
      const visible = useMemo(()=>{
        if(user.role==="SECTION")    return reports.filter(x=>x.sectionName===user.name);
        if(user.role==="AAO")        return reports.filter(x=>x.status==="PENDING_AAO" && x.sectionName===user.mappedSection);
        if(user.role==="SAO")        return reports.filter(x=>["AAO_APPROVED"].includes(x.status) && x.sectionName===user.mappedSection);
        if(user.role==="HINDI_CELL") return reports.filter(x=>x.status==="SAO_APPROVED");
        return reports;
      },[reports,user]);

      const [selected, setSelected] = useState(null);
      const [remark, setRemark]     = useState("");
      const [search, setSearch]     = useState("");

      const filtered = visible.filter(x=> !search || x.sectionName?.includes(search) || x.ackId?.includes(search));

      if(selected) return <ReportDetail report={selected} user={user} remark={remark} setRemark={setRemark} onAction={(action,rem)=>{ onAction(selected,action,rem); setSelected(null); setRemark(""); }} onBack={()=>{ setSelected(null); setRemark(""); }} />;

      return (
        <div style={{ background:"#fff", borderRadius:18, border:"1.5px solid #e2e8f0", overflow:"hidden" }}>
          <div style={{ background:r.grad, padding:"16px 22px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <h2 style={{ fontSize:15, fontWeight:800, margin:0, color:"#fff" }}>{user.role==="SECTION" ? "📋 मेरी रिपोर्टें" : "📥 आवक रिपोर्टें"}</h2>
          </div>
          <div style={{ padding:"12px 16px", background:"#f8fafc", borderBottom:"1px solid #e2e8f0" }}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 अनुभाग या पावती संख्या से खोजें..." style={{ width:"100%", boxSizing:"border-box", padding:"8px 12px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:13 }} />
          </div>
          {filtered.length===0?(
            <div style={{ textAlign:"center", padding:48, color:"#94a3b8" }}>
              <div style={{ fontSize:40 }}>{user.role==="SECTION"?"📂":"📭"}</div>
              <div style={{ marginTop:10, fontSize:14 }}>{user.role==="SECTION" ? "अभी तक कोई रिपोर्ट नहीं।" : "अभी कोई रिपोर्ट प्रतीक्षा में नहीं।"}</div>
            </div>
          ):(
            filtered.map((rep,i)=>{
              const st   = STATUS[rep.status]||STATUS.DRAFT;
              const c    = SECTION_COLORS[i%SECTION_COLORS.length];
              const canAct = (user.role==="AAO"&&rep.status==="PENDING_AAO") || (user.role==="SAO"&&rep.status==="AAO_APPROVED") || (user.role==="HINDI_CELL"&&rep.status==="SAO_APPROVED");
              return (
                <div key={rep.id} onClick={()=>setSelected(rep)} style={{ display:"flex", alignItems:"center", gap:12, padding:"14px 20px", borderBottom:"1px solid #f1f5f9", cursor:"pointer", transition:"background 0.15s" }} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                  <div style={{ width:40, height:40, borderRadius:12, background:c.bg, border:`1.5px solid ${c.border}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>{c.icon}</div>
                  <div style={{ flex:1, minWidth:0 }}><div style={{ fontSize:13, fontWeight:700, color:"#1e293b" }}>{rep.sectionName}</div><div style={{ fontSize:10, color:"#94a3b8" }}>{QUARTERS.find(q=>q.id===rep.quarter)?.label} · {rep.year} · {rep.ackId}</div></div>
                  <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
                    <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20, background:st.bg, color:st.color, border:`1px solid ${st.color}40`, whiteSpace:"nowrap" }}>{st.icon} {st.label}</span>
                  </div>
                  {canAct && <span style={{ fontSize:11, background:r.color, color:"#fff", padding:"4px 10px", borderRadius:10, fontWeight:700, flexShrink:0 }}>समीक्षा करें</span>}
                </div>
              );
            })
          )}
        </div>
      );
    }

    function ReportDetail({ report, user, remark, setRemark, onAction, onBack }) {
      const r  = ROLES[user.role];
      const st = STATUS[report.status]||STATUS.DRAFT;
      const canAct = (user.role==="AAO"&&report.status==="PENDING_AAO") || (user.role==="SAO"&&report.status==="AAO_APPROVED") || (user.role==="HINDI_CELL"&&report.status==="SAO_APPROVED");

      const actionBtns = {
        AAO:        [{ label:"✅ SAO को अग्रेषित करें",    action:"AAO_APPROVED",  grad:"linear-gradient(135deg,#10b981,#0ea5e9)" },{ label:"↩️ अनुभाग को वापस करें",   action:"AAO_RETURNED",  grad:"linear-gradient(135deg,#f97316,#ef4444)" }],
        SAO:        [{ label:"✅ हिंदी प्रकोष्ठ को भेजें",  action:"SAO_APPROVED",  grad:"linear-gradient(135deg,#10b981,#0ea5e9)" },{ label:"↩️ AAO को वापस करें",       action:"SAO_RETURNED",  grad:"linear-gradient(135deg,#f97316,#ef4444)" }],
        HINDI_CELL: [{ label:"🎉 अंतिम स्वीकृति दें",        action:"SUBMITTED",     grad:"linear-gradient(135deg,#f59e0b,#10b981)" },{ label:"❌ अस्वीकृत करें",          action:"REJECTED",      grad:"linear-gradient(135deg,#dc2626,#9f1239)" }],
      };

      return (
        <div style={{ maxWidth:760, margin:"0 auto" }}>
          <div className="no-print" style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
            <button onClick={onBack} style={{ background:"none", border:"none", color:"#6366f1", cursor:"pointer", fontSize:13, fontWeight:700 }}>← वापस सूची में</button>
            <button onClick={() => window.print()} style={{ background:"#1e293b", color:"#fff", border:"none", padding:"8px 16px", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer", boxShadow:"0 4px 10px rgba(0,0,0,0.1)" }}>🖨️ PDF में सेव करें</button>
          </div>

          <div style={{ background:r.grad, borderRadius:16, padding:"18px 22px", marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontSize:18, fontWeight:800, color:"#fff" }}>{report.sectionName}</div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,0.8)" }}>{QUARTERS.find(q=>q.id===report.quarter)?.label} · {report.year} · पावती: {report.ackId}</div>
            </div>
            <div style={{ background:"rgba(255,255,255,0.2)", borderRadius:20, padding:"4px 14px", fontSize:13, fontWeight:700, color:"#fff" }}>{st.icon} {st.label}</div>
          </div>

          <div className="print-box" style={{ background:"#fff", borderRadius:14, border:"1.5px solid #e2e8f0", padding:18, marginBottom:16 }}>
            <div style={{ fontSize:13, fontWeight:800, color:"#1e293b", marginBottom:12 }}>📋 रिपोर्ट विवरण</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              {Object.entries(report).slice(0, 20).map(([k,v]) => {
                if(typeof v === 'string' && v.length > 0 && !k.includes("id") && k !== "formData") return (
                  <div key={k} style={{ background:"#f8fafc", borderRadius:8, padding:"8px 10px", border:"1px solid #f1f5f9" }}>
                    <div style={{ fontSize:10, color:"#94a3b8", fontWeight:700 }}>{k.replace('b1_','').replace('b2_','').replace('s1_','')}</div>
                    <div style={{ fontSize:12, color:"#1e293b", fontWeight:600 }}>{v}</div>
                  </div>
                )
              })}
            </div>
          </div>

          {canAct && (
            <div className="no-print" style={{ background:"#fff", borderRadius:14, border:`2px solid ${r.color}40`, padding:20 }}>
              <div style={{ fontSize:14, fontWeight:800, color:"#1e293b", marginBottom:12 }}>{r.icon} आपकी कार्रवाई</div>
              <textarea value={remark} onChange={e=>setRemark(e.target.value)} rows={2} placeholder="टिप्पणी..." style={{ width:"100%", padding:"10px 14px", borderRadius:10, border:"1.5px solid #e2e8f0", marginBottom:12 }} />
              <div style={{ display:"flex", gap:12 }}>
                {(actionBtns[user.role]||[]).map(btn=>(
                  <button key={btn.action} onClick={()=>onAction(btn.action, remark)} style={{ flex:1, padding:"12px 0", borderRadius:12, border:"none", cursor:"pointer", background:btn.grad, color:"#fff", fontWeight:800 }}>{btn.label}</button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── ROOT ──────────────────────────────────────────────────────────────────────
    function App() {
      const [user, setUser]       = useState(()=>{ try { return JSON.parse(sessionStorage.getItem("rb_user_v4")); } catch { return null; } });
      const [view, setView]       = useState("dashboard");
      const [reports, setReports] = useState([]);

      // 🌟 Zoho Catalyst Data Fetching (सही API) 🌟
      const fetchReports = () => {
        if(!window.catalyst) return;
        
        // ✅ सीधे 'window.catalyst' से डेटा लाएँ
        window.catalyst.zcql().executeZCQLQuery("SELECT * FROM RajbhashaReports").then((response) => {
          const data = response.map(row => {
            let dbRow = row.RajbhashaReports;
            let parsedForm = {};
            let parsedTimeline = [];
            try { parsedForm = JSON.parse(dbRow.formData); } catch(e){}
            try { parsedTimeline = JSON.parse(dbRow.timeline); } catch(e){}
            
            return {
                ROWID: dbRow.ROWID,
                id: dbRow.ROWID, 
                sectionName: dbRow.sectionName,
                quarter: dbRow.quarter,
                year: dbRow.year,
                status: dbRow.status,
                ackId: dbRow.ackId,
                timestamp: dbRow.submittedAt, 
                timeline: parsedTimeline,
                ...parsedForm
            };
          });
          data.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
          setReports(data);
        }).catch(err => {
            console.log("Zoho Data Fetch Error:", err);
        });
      };

      useEffect(() => {
        if(user) fetchReports();
      }, [view, user]); 

      const handleLogin = u => { setUser(u); sessionStorage.setItem("rb_user_v4", JSON.stringify(u)); };
      const handleLogout = () => { setUser(null); sessionStorage.removeItem("rb_user_v4"); setView("dashboard"); };

      // 🌟 Zoho में Save करने का कोड (सही API) 🌟
      const handleSave = (report) => {
        const formDataToSave = { ...report };
        delete formDataToSave.sectionName; delete formDataToSave.quarter; delete formDataToSave.year;
        delete formDataToSave.status; delete formDataToSave.ackId; delete formDataToSave.timestamp; delete formDataToSave.timeline;

        const rowData = {
            sectionName: report.sectionName,
            quarter: report.quarter,
            year: report.year,
            status: report.status,
            ackId: report.ackId,
            submittedAt: report.timestamp, 
            timeline: JSON.stringify(report.timeline || []),
            formData: JSON.stringify(formDataToSave)
        };

        // ✅ सीधे 'window.catalyst' से सेव करें
        window.catalyst.datastore().table('RajbhashaReports').insertRow(rowData)
          .then(() => {
            setView("inbox");
          })
          .catch(err => alert("Zoho Save Error: " + err.message));
      };

      // 🌟 Zoho में Update करने का कोड (सही API) 🌟
      const handleAction = (report, action, remark) => {
        const timelineEntry = { ts:new Date().toISOString(), role:user.role, name:user.name, action:action, remark };
        const newTimeline = [...(report.timeline||[]), timelineEntry];

        const rowData = {
            ROWID: report.ROWID,
            status: action,
            timeline: JSON.stringify(newTimeline)
        };

        // ✅ सीधे 'window.catalyst' से अपडेट करें
        window.catalyst.datastore().table('RajbhashaReports').updateRow(rowData)
          .then(() => {
            setReports(prev => prev.map(r => r.ROWID === report.ROWID ? {...r, status:action, timeline:newTimeline} : r));
            setView("dashboard");
          })
          .catch(err => alert("Zoho Update Error: " + err.message));
      };

      if(!user) return <LoginScreen onLogin={handleLogin} />;

      return (
        <div style={{ minHeight:"100vh", background:"#f8fafc", fontFamily:"'Noto Sans Devanagari','Inter',sans-serif" }}>
          <div className="no-print" style={{ background: "#fefcbf", color: "#975a16", padding: "8px 16px", fontSize: "13px", fontWeight: "700", borderBottom: "1px solid #fef08a", display: "flex", alignItems: "center" }}>
            <span style={{ marginRight: "10px", fontSize: "16px" }}>📢</span>
            <marquee scrollamount="5">रिपोर्ट भरने की अंतिम तिथि तिमाही समाप्ति से आगामी माह की 5 तारीख है। कृपया रिपोर्ट समय पर प्रस्तुत करें।</marquee>
          </div>

          <Navbar user={user} view={view} setView={setView} onLogout={handleLogout} refreshData={fetchReports} />
          <main style={{ maxWidth:960, margin:"0 auto", padding:"24px 16px 80px" }}>
            {view==="dashboard" && <Dashboard reports={reports} user={user} setView={setView} />}
            {view==="form"      && user.role==="SECTION" && <ReportForm onSave={handleSave} user={user} reports={reports} />}
            {view==="inbox"     && <Inbox reports={reports} user={user} onAction={handleAction} />}
            {view==="consolidated" && <ConsolidatedView reports={reports} user={user} />}
          </main>
          <footer className="no-print" style={{ position:"fixed", bottom:0, left:0, right:0, background:"linear-gradient(90deg,#1e1b4b,#312e81)", padding:"7px 22px", display:"flex", justifyContent:"space-between", fontSize:10, color:"rgba(255,255,255,0.5)" }}>
            <span>© 2026 Digital India · राजभाषा QPR v4.0</span>
            <span>पश्चिम रेलवे</span>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
