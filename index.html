<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#312e81">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="राजभाषा QPR">
  <title>राजभाषा QPR v4.5 - Official</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB9_RRdMzgpR0R5Lh04JZhGp0IYrzyVJ0s",
      authDomain: "rajbhasha-qpr.firebaseapp.com",
      projectId: "rajbhasha-qpr",
      storageBucket: "rajbhasha-qpr.firebasestorage.app",
      messagingSenderId: "934013797840",
      appId: "1:934013797840:web:c747cb5fd4b905885125d5",
      measurementId: "G-WX79KCQ4XV"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>

  <style>
    @media screen { .print-only { display: none !important; } }
    body { font-family: 'Noto Sans Devanagari', sans-serif; background: #f1f5f9; color: #1e293b; }
    
    .standard-doc { 
       width: 100%; line-height: 1.5; color: #000; 
       font-family: 'Noto Sans Devanagari', 'Times New Roman', serif; 
       background: #fff; padding: 40px; border-radius: 8px; border: 1px solid #94a3b8;
       box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box;
    }
    .standard-doc table { width: 100%; border-collapse: collapse; margin-bottom: 20px; border: 1.5px solid #000; }
    .standard-doc th, .standard-doc td { border: 1px solid #000; padding: 10px; text-align: left; font-size: 11pt; }
    .standard-doc th { background-color: #f8fafc !important; font-weight: bold; text-align: center; }
    .standard-doc h2 { text-align: center; font-size: 16pt; margin-bottom: 10px; font-weight: bold; text-decoration: underline; }
    .standard-doc h3 { text-align: center; font-size: 13pt; margin-bottom: 30px; font-weight: normal; }

    @media print {
      .no-print, .screen-only { display: none !important; }
      .print-only { display: block !important; }
      @page { margin: 20mm; size: A4; }
      body { background: #fff !important; padding: 0; }
      .standard-doc { border: none; box-shadow: none; padding: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- 🛡️ UTILS (Safe Str & Date) ---
    const safeStr = (v, f = "") => (v === null || v === undefined || typeof v === 'object') ? f : String(v);
    const formatDate = (ds) => ds ? new Date(ds).toLocaleDateString('en-GB') : '-';

    const QUARTERS = [{ id: "Q1", label: "Q1 · अप्रैल–जून" },{ id: "Q2", label: "Q2 · जुलाई–सितंबर" },{ id: "Q3", label: "Q3 · अक्टूबर–दिसंबर" },{ id: "Q4", label: "Q4 · जनवरी–मार्च" }];
    const YEARS = ["2024","2025","2026","2027"];
    const ROLES = {
      SECTION:    { id: "SECTION",    label: "अनुभाग",        grad: "linear-gradient(135deg,#4f46e5,#7c3aed)" },
      AAO:        { id: "AAO",        label: "AAO",            grad: "linear-gradient(135deg,#0284c7,#2563eb)" },
      SAO:        { id: "SAO",        label: "SAO",            grad: "linear-gradient(135deg,#059669,#10b981)" },
      HINDI_CELL: { id: "HINDI_CELL", label: "हिंदी प्रकोष्ठ", grad: "linear-gradient(135deg,#ea580c,#f97316)" },
    };
    const PASSWORDS = { AAO: "AAO@2025", SAO: "SAO@2025", HINDI_CELL: "HINDI@2025" };

    // --- 📑 CONSOLIDATED VIEW ---
    function ConsolidatedView({ reports }) {
      const [selQ, setSelQ] = useState("Q4");
      const [selY, setSelY] = useState("2026");

      const filtered = reports.filter(r => safeStr(r.year) === selY && safeStr(r.quarter) === selQ && safeStr(r.status) === "SUBMITTED");
      const sum = (key) => filtered.reduce((acc, curr) => acc + (parseFloat(curr[key]) || 0), 0);

      return (
        <div className="standard-doc">
          <div className="no-print flex gap-4 mb-8 bg-slate-50 p-4 rounded-xl border">
            <select value={selQ} onChange={e => setSelQ(e.target.value)} className="p-2 border rounded font-bold">{QUARTERS.map(q => <option key={q.id} value={q.id}>{q.label}</option>)}</select>
            <select value={selY} onChange={e => setSelY(e.target.value)} className="p-2 border rounded font-bold">{YEARS.map(y => <option key={y} value={y}>{y}</option>)}</select>
            <button onClick={() => window.print()} className="ml-auto bg-indigo-600 text-white px-6 py-2 rounded font-bold shadow-lg">🖨️ समेकित रिपोर्ट प्रिंट करें</button>
          </div>

          <h2>राजभाषा तिमाही प्रगति रिपोर्ट का समेकन (Consolidated Report)</h2>
          <h3>{QUARTERS.find(q=>q.id===selQ)?.label} · वर्ष {selY}</h3>
          <p className="text-center mb-6">कुल स्वीकृत अनुभाग रिपोर्टें: <b>{filtered.length}</b></p>

          <table>
            <thead><tr><th>मद विवरण</th><th className="w-40">कुल योग</th></tr></thead>
            <tbody>
              <tr><td>1. कुल फाइलें (माननीय मंत्री जी को प्रस्तुत)</td><td className="text-center font-bold">{sum('b1_s1_totalFiles')}</td></tr>
              <tr><td>2. हिंदी में फाइलें</td><td className="text-center font-bold">{sum('b1_s1_hindiFiles')}</td></tr>
              <tr><td>3. धारा 3(3) - कुल जारी दस्तावेज</td><td className="text-center font-bold">{sum('b1_s3_totalIssued')}</td></tr>
              <tr><td>4. धारा 3(3) - द्विभाषी जारी</td><td className="text-center font-bold">{sum('b1_s3_bilingual')}</td></tr>
              <tr><td>5. हिंदी में प्राप्त कुल पत्र</td><td className="text-center font-bold">{sum('b1_s4_totalReceived')}</td></tr>
              <tr><td>6. कुल पत्राचार (क + ख + ग क्षेत्र)</td><td className="text-center font-bold">{sum('b1_s6_ka_total') + sum('b1_s6_kha_total') + sum('b1_s6_ga_total')}</td></tr>
              <tr><td>7. कुल हिंदी पत्राचार</td><td className="text-center font-bold">{sum('b1_s6_ka_hindi') + sum('b1_s6_kha_hindi') + sum('b1_s6_ga_hindi')}</td></tr>
              <tr><td>8. कुल फाइल टिप्पण (पृष्ठ)</td><td className="text-center font-bold">{sum('b1_s7_totalPages')}</td></tr>
              <tr><td>9. हिंदी टिप्पण (पृष्ठ)</td><td className="text-center font-bold">{sum('b1_s7_hindiPages')}</td></tr>
            </tbody>
          </table>
          <p className="no-print text-xs italic text-slate-400">* यह रिपोर्ट केवल स्वीकृत डेटा पर आधारित है।</p>
        </div>
      );
    }

    // --- 🏛️ MASTER CONTROL (EDITOR & TARGET AUDITOR) ---
    function MasterControl({ reports, onEditReport }) {
      const [q, setQ] = useState("Q4");
      const [y, setY] = useState("2026");
      const validReports = reports.filter(r => r.status !== "SETTINGS");
      const filtered = validReports.filter(r => safeStr(r.quarter) === q && safeStr(r.year) === y);

      const defaulters = filtered.filter(r => {
         const num = (v) => parseFloat(v) || 0;
         const s33 = num(r.b1_s3_totalIssued) > 0 ? (num(r.b1_s3_bilingual) + num(r.b1_s3_hindiOnly)) / num(r.b1_s3_totalIssued) < 1 : false;
         return s33; // Add more logic for Rule 5 etc.
      });

      return (
        <div className="flex flex-col gap-8">
          <div className="bg-white p-6 rounded-2xl shadow-sm border">
            <h2 className="text-xl font-black mb-4">🎯 लक्ष्य ट्रैकर (Defaulters)</h2>
            <div className="flex gap-4 mb-6">
               <select value={q} onChange={e=>setQ(e.target.value)} className="p-2 border rounded font-bold">{QUARTERS.map(x=><option key={x.id} value={x.id}>{x.label}</option>)}</select>
               <select value={y} onChange={e=>setY(e.target.value)} className="p-2 border rounded font-bold">{YEARS.map(x=><option key={x} value={x}>{x}</option>)}</select>
            </div>
            {defaulters.length === 0 ? <p className="text-green-600 font-bold">✅ सभी अनुभागों ने लक्ष्य प्राप्त कर लिया है।</p> : 
              defaulters.map(d => <div key={d.id} className="p-3 mb-2 bg-red-50 border border-red-200 rounded-lg flex justify-between items-center">
                <span className="font-bold text-red-700">{safeStr(d.sectionName)}</span>
                <button onClick={()=>onEditReport(d)} className="text-xs bg-red-600 text-white px-3 py-1 rounded">Edit</button>
              </div>)
            }
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-sm border">
            <h2 className="text-xl font-black mb-4">✏️ मास्टर रिपोर्ट एडिटर</h2>
            <table className="w-full text-sm">
              <thead className="bg-slate-50"><tr><th className="p-3">अनुभाग</th><th>तिमाही/वर्ष</th><th>कार्रवाई</th></tr></thead>
              <tbody>
                {validReports.map(r => (
                  <tr key={r.id} className="border-b">
                    <td className="p-3 font-bold">{safeStr(r.sectionName)}</td>
                    <td>{safeStr(r.quarter)} / {safeStr(r.year)}</td>
                    <td><button onClick={()=>onEditReport(r)} className="text-indigo-600 font-bold hover:underline">सीधे एडिट करें</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // --- 📝 REPORT FORM ---
    function ReportForm({ initialData, onSave, reports, onCancel }) {
      const [data, setData] = useState(initialData || emptyForm());
      const [step, setStep] = useState(0);
      
      const validationError = useMemo(() => {
        const num = (v) => parseFloat(v) || 0;
        const sum4 = num(data.b1_s4_hindiReply) + num(data.b1_s4_englishReply) + num(data.b1_s4_noReplyNeeded);
        if(num(data.b1_s4_totalReceived) > 0 && sum4 !== num(data.b1_s4_totalReceived)) return `मद 4: योग (${sum4}) प्राप्त पत्रों (${data.b1_s4_totalReceived}) के बराबर होना चाहिए।`;
        return null;
      }, [data]);

      const steps = ["कार्यालय विवरण", "भाग-I आंकड़े", "पूर्वावलोकन"];

      return (
        <div className="max-w-3xl mx-auto">
          <div className="bg-white p-4 rounded-xl shadow-sm mb-6 flex justify-between">
            {steps.map((s, i) => <div key={i} className={`text-xs font-bold ${step===i?'text-indigo-600':'text-slate-300'}`}>{i+1}. {s}</div>)}
          </div>

          {step === 0 && (
            <div className="bg-white p-6 rounded-2xl border">
              <div className="grid gap-4">
                <Inp label="कार्यालय/अनुभाग का नाम" value={data.officeNameAddress} onChange={v=>setData({...data, officeNameAddress:v})} />
                <div className="grid grid-cols-2 gap-4">
                   <Inp label="वर्ष" value={data.year} disabled />
                   <Radio label="क्षेत्र" value={data.region} onChange={v=>setData({...data, region:v})} options={["A","B","C"]} />
                </div>
                <Inp label="अधिकारी का नाम" value={data.officerName} onChange={v=>setData({...data, officerName:v})} />
              </div>
            </div>
          )}

          {step === 1 && (
            <div className="grid gap-4">
              <div className="bg-white p-6 rounded-2xl border">
                <h4 className="font-bold mb-4">पत्राचार एवं फाइलें</h4>
                <div className="grid grid-cols-2 gap-4">
                  <Num label="कुल फाइलें" value={data.b1_s1_totalFiles} onChange={v=>setData({...data, b1_s1_totalFiles:v})} />
                  <Num label="हिंदी फाइलें" value={data.b1_s1_hindiFiles} onChange={v=>setData({...data, b1_s1_hindiFiles:v})} />
                  <Num label="कुल प्राप्त पत्र" value={data.b1_s4_totalReceived} onChange={v=>setData({...data, b1_s4_totalReceived:v})} />
                  <Num label="हिंदी में उत्तर" value={data.b1_s4_hindiReply} onChange={v=>setData({...data, b1_s4_hindiReply:v})} />
                </div>
              </div>
            </div>
          )}

          <div className="mt-8 flex justify-between items-center">
            <button onClick={()=>setStep(step-1)} disabled={step===0} className="text-slate-400 font-bold">पिछला</button>
            {validationError && <p className="text-[10px] text-red-600 font-bold">{validationError}</p>}
            <button onClick={()=>{ if(step<2) setStep(step+1); else onSave(data); }} disabled={!!validationError} className="bg-indigo-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg">
              {step < 2 ? "अगला" : "जमा करें ✅"}
            </button>
          </div>
        </div>
      );
    }

    // --- 🚀 MAIN APP ---
    function App() {
      const [user, setUser] = useState(() => JSON.parse(sessionStorage.getItem("rb_u_v4")));
      const [view, setView] = useState("dashboard");
      const [reports, setReports] = useState([]);
      const [editingReport, setEditingReport] = useState(null);

      useEffect(() => {
        const unsub = db.collection("reports").onSnapshot(snap => {
          setReports(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).filter(r => r.status !== "SETTINGS"));
        });
        return () => unsub();
      }, []);

      if (!user) return (
        <div className="h-screen flex items-center justify-center bg-slate-900">
           <div className="bg-white p-8 rounded-3xl w-full max-w-sm">
             <h1 className="text-2xl font-black text-center mb-6">राजभाषा QPR लॉगिन</h1>
             <button onClick={()=>{const u={role:"HINDI_CELL", name:"हिंदी प्रकोष्ठ"}; setUser(u); sessionStorage.setItem("rb_u_v4", JSON.stringify(u));}} className="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold mb-3">हिंदी प्रकोष्ठ प्रवेश</button>
             <button onClick={()=>{const u={role:"SECTION", name:"आंतरिक लेखापरीक्षा"}; setUser(u); sessionStorage.setItem("rb_u_v4", JSON.stringify(u));}} className="w-full bg-slate-100 text-slate-800 p-4 rounded-xl font-bold">अनुभाग प्रवेश</button>
           </div>
        </div>
      );

      return (
        <div className="min-h-screen">
          <nav className="no-print bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
             <div className="font-black text-indigo-600">🏛️ राजभाषा QPR</div>
             <div className="flex gap-4 text-xs font-bold uppercase">
                <button onClick={()=>setView("dashboard")}>डैशबोर्ड</button>
                <button onClick={()=>setView("consolidated")}>समेकित</button>
                <button onClick={()=>setView("master")}>मास्टर कंट्रोल</button>
                <button onClick={()=>{setUser(null); sessionStorage.removeItem("rb_u_v4");}}>बाहर</button>
             </div>
          </nav>
          
          <main className="p-6">
            {view === "consolidated" && <ConsolidatedView reports={reports} />}
            {view === "master" && <MasterControl reports={reports} onEditReport={(r)=>{setEditingReport(r); setView("form");}} />}
            {view === "form" && <ReportForm initialData={editingReport} reports={reports} onSave={(d)=>{ db.collection("reports").add(d); setView("dashboard"); }} onCancel={()=>setView("dashboard")} />}
            {view === "dashboard" && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="bg-white p-6 rounded-2xl border shadow-sm">
                   <h2 className="font-bold mb-4">आवक रिपोर्टें ({reports.length})</h2>
                   {reports.map(r => <div key={r.id} onClick={()=>{setEditingReport(r); setView("form");}} className="p-3 border-b cursor-pointer hover:bg-slate-50">
                     <div className="font-bold">{safeStr(r.sectionName)}</div>
                     <div className="text-[10px] text-slate-400">{safeStr(r.quarter)} · {safeStr(r.year)}</div>
                   </div>)}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
