    // ---------- Helper Functions for Target Evaluation ----------
    const num = (v) => parseFloat(v) || 0;

    function evaluateReportAgainstTargets(report) {
      const region = report.region || 'B';
      const regionTargets = TARGETS.byRegion[region] || TARGETS.byRegion['B'];
      const results = { overallAchieved: true, items: [], summary: { totalItems:0, achieved:0, notAchieved:0 } };
      
      // Correspondence percentage for Region 'क' (field b1_s6)
      const kaTotal = num(report.b1_s6_ka_total);
      const kaHindi = num(report.b1_s6_ka_hindi);
      const kaPercentage = kaTotal > 0 ? (kaHindi / kaTotal) * 100 : 0;
      const kaTarget = regionTargets.correspondencePercentage;
      results.items.push({
        field: 'correspondence_ka',
        label: `क्षेत्र 'क' में हिंदी पत्राचार (${kaPercentage.toFixed(1)}%)`,
        achieved: kaPercentage >= kaTarget,
        value: kaPercentage.toFixed(1),
        target: kaTarget,
        gap: Math.max(0, kaTarget - kaPercentage).toFixed(1)
      });

      // Workshops
      const workshops = num(report.b1_s8_workshops);
      results.items.push({
        field: 'workshops',
        label: 'हिंदी कार्यशालाएं',
        achieved: workshops >= TARGETS.workshops,
        value: workshops,
        target: TARGETS.workshops,
        gap: Math.max(0, TARGETS.workshops - workshops)
      });

      // Committee meetings (b1_s9_subOfficeMeetings)
      const meetings = num(report.b1_s9_subOfficeMeetings);
      results.items.push({
        field: 'committeeMeetings',
        label: 'रा.भा.का.स. की बैठकें',
        achieved: meetings >= TARGETS.committeeMeetings,
        value: meetings,
        target: TARGETS.committeeMeetings,
        gap: Math.max(0, TARGETS.committeeMeetings - meetings)
      });

      // Training officers
      const officersTrained = num(report.b1_s8_officers);
      results.items.push({
        field: 'trainingOfficers',
        label: 'प्रशिक्षित अधिकारी',
        achieved: officersTrained >= TARGETS.trainingOfficers,
        value: officersTrained,
        target: TARGETS.trainingOfficers,
        gap: Math.max(0, TARGETS.trainingOfficers - officersTrained)
      });

      // Training staff
      const staffTrained = num(report.b1_s8_staff);
      results.items.push({
        field: 'trainingStaff',
        label: 'प्रशिक्षित कर्मचारी',
        achieved: staffTrained >= TARGETS.trainingStaff,
        value: staffTrained,
        target: TARGETS.trainingStaff,
        gap: Math.max(0, TARGETS.trainingStaff - staffTrained)
      });

      // Replies to Hindi letters (b1_s4)
      const totalHindiLetters = num(report.b1_s4_totalReceived);
      const repliesInHindi = num(report.b1_s4_hindiReply);
      const replyPercentage = totalHindiLetters > 0 ? (repliesInHindi / totalHindiLetters) * 100 : 0;
      results.items.push({
        field: 'repliesToHindi',
        label: 'हिंदी पत्रों के उत्तर हिंदी में',
        achieved: replyPercentage >= TARGETS.repliesToHindiLetters,
        value: replyPercentage.toFixed(1) + '%',
        target: TARGETS.repliesToHindiLetters + '%',
        gap: totalHindiLetters > 0 ? Math.max(0, TARGETS.repliesToHindiLetters - replyPercentage).toFixed(1) : 0
      });

      // Unicode laptops (Part II)
      const totalLaptops = num(report.b2_s4_totalLaptops);
      const unicodeLaptops = num(report.b2_s4_unicode);
      const unicodePercentage = totalLaptops > 0 ? (unicodeLaptops / totalLaptops) * 100 : 0;
      results.items.push({
        field: 'unicodeLaptops',
        label: 'यूनिकोड सक्षम कंप्यूटर',
        achieved: unicodePercentage >= TARGETS.unicodeLaptops,
        value: unicodePercentage.toFixed(1) + '%',
        target: TARGETS.unicodeLaptops + '%',
        gap: totalLaptops > 0 ? Math.max(0, TARGETS.unicodeLaptops - unicodePercentage).toFixed(1) : 0
      });

      // Bilingual forms (Part II)
      const totalForms = num(report.b2_s5_formsTotal);
      const bilingualForms = num(report.b2_s5_formsBilingual);
      const formsPercentage = totalForms > 0 ? (bilingualForms / totalForms) * 100 : 0;
      results.items.push({
        field: 'bilingualForms',
        label: 'द्विभाषी प्रपत्र',
        achieved: formsPercentage >= TARGETS.bilingualForms,
        value: formsPercentage.toFixed(1) + '%',
        target: TARGETS.bilingualForms + '%',
        gap: totalForms > 0 ? Math.max(0, TARGETS.bilingualForms - formsPercentage).toFixed(1) : 0
      });

      // Website Hindi option
      const websiteLangOption = report.b2_website_langOption === 'हाँ';
      results.items.push({
        field: 'websiteHindiOption',
        label: 'वेबसाइट पर हिंदी का विकल्प',
        achieved: websiteLangOption,
        value: websiteLangOption ? 'हाँ' : 'नहीं',
        target: 'हाँ',
        gap: websiteLangOption ? 0 : 1
      });

      results.summary.totalItems = results.items.length;
      results.summary.achieved = results.items.filter(i => i.achieved).length;
      results.summary.notAchieved = results.items.length - results.summary.achieved;
      results.overallAchieved = results.summary.notAchieved === 0;
      return results;
    }

    function SectionTargetGapAnalysis({ reports, sectionsList, quarter, year }) {
      const filteredReports = reports.filter(r => r.quarter === quarter && r.year === year);
      const sectionEvaluations = sectionsList.map(section => {
        const report = filteredReports.find(r => r.sectionName === section);
        if (!report) return { section, submitted: false };
        const evalResult = evaluateReportAgainstTargets(report);
        return { section, submitted: true, evaluation: evalResult };
      });
      
      return (
        <div style={{ background: '#fff', borderRadius: 16, padding: 20, border: '1.5px solid #e2e8f0', marginTop: 20 }}>

              </tr>

              {sectionEvaluations.map(se => (
                <tr key={se.section} style={{ borderBottom: '1px solid #f1f5f9' }}>
                  <td style={{ padding: '8px' }}>{se.section}</td>
                  <td style={{ padding: '8px' }}>
                    {!se.submitted ? '❌ रिपोर्ट जमा नहीं' :
                     se.evaluation.overallAchieved ? '✅ सभी लक्ष्य पूर्ण' :
                     `⚠️ ${se.evaluation.summary.notAchieved} लक्ष्य अधूरे`}
                  </td>
                  <td style={{ padding: '8px' }}>
                    {se.submitted && !se.evaluation.overallAchieved && (

    function LoginScreen({ onLogin, sectionsList }) {
      const [step, setStep]       = useState("choice");
      const [section, setSection] = useState("");
      const [pass, setPass]       = useState("");
      const [err, setErr]         = useState("");

      const roleCards = [
        { role:"SECTION",    step:"section", desc:"रिपोर्ट भरें और AAO को भेजें" },
        { role:"AAO",        step:"aao",     desc:"अनुभाग की रिपोर्ट जाँचें और SAO को भेजें" },
        { role:"SAO",        step:"sao",     desc:"AAO की अनुशंसा स्वीकृत करें और आगे भेजें" },
        { role:"HINDI_CELL", step:"hindi",   desc:"SAO से आई रिपोर्ट अंतिम रूप से स्वीकार करें" },
      ];

      const tryLogin = (role, name) => {
        const pw = PASSWORDS[role];
        if (pw && pass !== pw) { setErr("❌ गलत पासवर्ड"); return; }
        
        if (role === "AAO" || role === "SAO") {
           if (!section) { setErr("❌ कृपया अपना अनुभाग चुनें"); return; }
           onLogin({ role: role, name: `${role}-${section}`, mappedSection: section });
        } else if (role === "HINDI_CELL") {
           onLogin({ role: role, name: "हिंदी प्रकोष्ठ", mappedSection: "ALL" });
        } else {
           onLogin({ role: role, name: name, mappedSection: name });
        }
      };

      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#1e1b4b 0%,#312e81 40%,#4c1d95 70%,#7c3aed 100%)", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>

              {step==="sao" && <PwdLogin role="SAO" pass={pass} setPass={setPass} err={err} setErr={setErr} section={section} setSection={setSection} onLogin={()=>tryLogin("SAO")} onBack={()=>{setStep("choice"); setPass(""); setErr(""); setSection("");}} sectionsList={sectionsList} />}

          </div>
          <div style={{ display:"flex", gap:4 }}>
            {tabs.map(t=>(
              <button key={t.id} onClick={() => { setView(t.id); if(clearEdit) clearEdit(); }} style={{ display:"flex", alignItems:"center", gap:5, padding:"6px 12px", borderRadius:10, cursor:"pointer", fontSize:12, border:"none", fontWeight:600, background: view===t.id ? "rgba(255,255,255,0.22)" : "transparent", color: view===t.id ? "#fff" : "rgba(255,255,255,0.7)" }}>
                <span style={{ fontSize:15 }}>{t.icon}</span><span>{t.label}</span>

          <div style={{ display:"flex", alignItems:"center", gap:10 }}>

            <button onClick={onLogout} style={{ fontSize:11, color:"#fecaca", background:"rgba(220,38,38,0.2)", border:"1px solid rgba(220,38,38,0.35)", borderRadius:8, padding:"5px 10px", cursor:"pointer", fontWeight:700 }}>बाहर</button>
          </div>

    }

    function Dashboard({ reports, user, setView, sectionsList }) {
      const r = ROLES[user.role];
      const myReports = user.role==="SECTION" ? reports.filter(x=>x.sectionName===user.name) : reports;
      
      const inboxCount = { 
        AAO: reports.filter(x=>["PENDING_AAO", "SAO_RETURNED"].includes(x.status) && x.sectionName===user.mappedSection).length, 
        SAO: reports.filter(x=>x.status==="AAO_APPROVED" && x.sectionName===user.mappedSection).length,

      const pendingForMe = inboxCount[user.role] || 0;

      const [trackQ, setTrackQ] = useState("Q4");
      const [trackY, setTrackY] = useState("2026");

      const stats = [
        { label:"कुल रिपोर्टें",  value: myReports.length, icon:"📄", c:"#6366f1" },
        { label:"लंबित", value: pendingForMe, icon:"⏳", c:"#f59e0b" },

      ];

      // 🌟 Hindi Cell: Alert for sections not submitted

            <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", marginBottom:10 }}>रिपोर्ट प्रवाह</div>
            <WorkflowPipeline currentRole={user.role} />
          </div>

          {user.role === "HINDI_CELL" && missingSections.length > 0 && (
            <div className="no-print" style={{ background:"#fee2e2", border:"1.5px solid #ef4444", borderRadius:12, padding:"14px 18px" }}>
              <strong>⚠️ रिपोर्ट जमा न करने वाले अनुभाग:</strong> {missingSections.join(', ')}
            </div>
          )}

          {user.role === "HINDI_CELL" && (
            <div className="no-print" style={{ background:"#fff", borderRadius:16, padding:"20px", border:"1.5px solid #e2e8f0" }}>
              <h3 style={{ fontSize:16, fontWeight:800, margin:"0 0 14px", color:"#1e293b" }}>📊 अनुभागों की रिपोर्ट जमा स्थिति</h3>
              <div style={{ display:"flex", gap:10, marginBottom:16 }}>
                <select value={trackQ} onChange={e=>setTrackQ(e.target.value)} style={{ padding:"8px 12px", borderRadius:8, border:"1px solid #cbd5e1", outline:"none", fontSize:13, fontWeight:600 }}>
                  {QUARTERS.map(q=><option key={q.id} value={q.id}>{q.label}</option>)}
                </select>
                <select value={trackY} onChange={e=>setTrackY(e.target.value)} style={{ padding:"8px 12px", borderRadius:8, border:"1px solid #cbd5e1", outline:"none", fontSize:13, fontWeight:600 }}>
                  {YEARS.map(y=><option key={y} value={y}>{y}</option>)}
                </select>
              </div>
              
              <div style={{ fontSize:13, fontWeight:700, color:"#475569", marginBottom:12 }}>
                कुल जमा रिपोर्टें: <span style={{ color:"#10b981", fontSize:18 }}>{reports.filter(r => r.year === trackY && r.quarter === trackQ).length}</span> / {sectionsList.length}
              </div>
              
              <div style={{ display:"flex", flexWrap:"wrap", gap:10 }}>
                {sectionsList.map(sec => {
                  const hasSubmitted = reports.some(r => r.sectionName === sec && r.year === trackY && r.quarter === trackQ);
                  return (
                    <div key={sec} style={{ 
                      padding:"8px 14px", borderRadius:8, fontSize:12, fontWeight:700,
                      background: hasSubmitted ? "#f8fafc" : "#eef2ff",

                      opacity: hasSubmitted ? 0.6 : 1, 
                      display: "flex", alignItems: "center", gap: "6px"
                    }}>
                      {sec} {hasSubmitted ? "✅" : ""}
                    </div>
                  )
                })}
              </div>
            </div>
          )}

          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))", gap:12 }}>
            {stats.map(s=>(
              <div key={s.label} style={{ background:`${s.c}15`, borderRadius:14, padding:"16px 18px", border:`1.5px solid ${s.c}30` }}>
                <div style={{ fontSize:22 }}>{s.icon}</div><div style={{ fontSize:28, fontWeight:800, color:s.c, lineHeight:1, marginTop:4 }}>{s.value}</div><div style={{ fontSize:11, color:s.c, marginTop:4, fontWeight:600 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {user.role!=="SECTION" && pendingForMe>0 && (
            <button onClick={()=>setView("inbox")} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:r.grad, borderRadius:14, padding:"16px 22px", border:"none", cursor:"pointer", color:"#fff", boxShadow:`0 4px 18px ${r.color}40`, }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}><span style={{ fontSize:28 }}>📥</span><div style={{ textAlign:"left" }}><div style={{ fontWeight:800, fontSize:15 }}>{pendingForMe} रिपोर्ट आपकी प्रतीक्षा में</div></div></div><span style={{ fontSize:22 }}>→</span>
            </button>
          )}
        </div>
      );
    }

    function ReportForm({ onSave, user, reports, initialData, onCancel }) {
      const [data, setData] = useState(initialData || emptyForm());
      const [step, setStep] = useState(0);
      const [done, setDone] = useState(false);
      const set = (k,v) => setData(d=>({...d,[k]:v}));
      
      const isQ4 = data.quarter==="Q4";
      const isHindiSection = user.name === "हिंदी अनुभाग" || user.role === "HINDI_CELL";
      const showPart2 = isQ4 && isHindiSection; 
      const totalSteps = showPart2 ? 4 : 3;

      const disableBasicInfo = !isHindiSection;
      const alreadySubmitted = !initialData && reports.some(r => r.sectionName === user.name && r.year === data.year && r.quarter === data.quarter);

      const validationErrors = useMemo(() => {
        const errs = [];
        const num = (v) => parseFloat(v) || 0;

        // Required fields
        const required = ['officeNameAddress','officerName','phone','email','year','quarter','region','b1_s1_totalFiles','b1_s3_totalIssued','b1_s4_totalReceived'];
        required.forEach(f => { if (!data[f] && data[f] !== 0) errs.push(`${FIELD_LABELS_HINDI[f] || f} आवश्यक है।`); });

        if(num(data.b1_s1_hindiFiles) > num(data.b1_s1_totalFiles)) errs.push("भाग 1(1): हिंदी फाइलें कुल फाइलों से अधिक नहीं हो सकतीं।");
        if(num(data.b1_s2_hindiMinutes) > num(data.b1_s2_totalMeetings)) errs.push("भाग 1(2): हिंदी बैठकें कुल बैठकों से अधिक नहीं हो सकतीं।");
        if(num(data.b1_s2_hindiDocs) > num(data.b1_s2_totalDocs)) errs.push("भाग 1(2): हिंदी कागजात कुल कागजातों से अधिक नहीं हो सकते।");
        
        const sum3 = num(data.b1_s3_bilingual) + num(data.b1_s3_englishOnly) + num(data.b1_s3_hindiOnly);
        if(num(data.b1_s3_totalIssued) > 0 && sum3 !== num(data.b1_s3_totalIssued)) errs.push(`भाग 1(3): जारी दस्तावेजों का योग (${sum3}) कुल (${data.b1_s3_totalIssued}) के बराबर होना चाहिए।`);

        const sum4Reply = num(data.b1_s4_hindiReply) + num(data.b1_s4_englishReply) + num(data.b1_s4_noReplyNeeded);
        if(num(data.b1_s4_totalReceived) > 0 && sum4Reply !== num(data.b1_s4_totalReceived)) errs.push(`भाग 1(4): कुल उत्तरों का योग (${sum4Reply}) प्राप्त पत्रों (${data.b1_s4_totalReceived}) के बराबर होना चाहिए।`);

        const sum5Ka = num(data.b1_s5_ka_hindiReply) + num(data.b1_s5_ka_engReply) + num(data.b1_s5_ka_noReply);
        if(num(data.b1_s5_ka_total) > 0 && sum5Ka !== num(data.b1_s5_ka_total)) errs.push(`भाग 1(5) 'क' क्षेत्र: उत्तरों का योग (${sum5Ka}) प्राप्त अंग्रेजी पत्रों (${data.b1_s5_ka_total}) के बराबर होना चाहिए।`);

        const sum5Kha = num(data.b1_s5_kha_hindiReply) + num(data.b1_s5_kha_engReply) + num(data.b1_s5_kha_noReply);
        if(num(data.b1_s5_kha_total) > 0 && sum5Kha !== num(data.b1_s5_kha_total)) errs.push(`भाग 1(5) 'ख' क्षेत्र: उत्तरों का योग (${sum5Kha}) प्राप्त अंग्रेजी पत्रों (${data.b1_s5_kha_total}) के बराबर होना चाहिए।`);

        if(num(data.b1_s6_ka_hindi) > num(data.b1_s6_ka_total)) errs.push("भाग 1(6): 'क' क्षेत्र में हिंदी पत्राचार कुल से अधिक है।");
        if(num(data.b1_s6_kha_hindi) > num(data.b1_s6_kha_total)) errs.push("भाग 1(6): 'ख' क्षेत्र में हिंदी पत्राचार कुल से अधिक है।");
        if(num(data.b1_s6_ga_hindi) > num(data.b1_s6_ga_total)) errs.push("भाग 1(6): 'ग' क्षेत्र में हिंदी पत्राचार कुल से अधिक है।");

        if(num(data.b1_s7_hindiPages) + num(data.b1_s7_engPages) !== num(data.b1_s7_totalPages) && num(data.b1_s7_totalPages) > 0) errs.push("भाग 1(7): हिंदी और अंग्रेजी पृष्ठों का योग कुल पृष्ठों के बराबर होना चाहिए।");

        if(showPart2) {
            if(num(data.b2_comp_trained) > num(data.b2_comp_total)) errs.push("भाग 2(3): प्रशिक्षित कार्मिक कुल कार्मिकों से अधिक नहीं हो सकते।");
            if(num(data.b2_comp_working) > num(data.b2_comp_trained)) errs.push("भाग 2(3): हिंदी में काम करने वाले लोग प्रशिक्षित लोगों से अधिक नहीं हो सकते।");
            if(num(data.b2_s4_unicode) > num(data.b2_s4_totalLaptops)) errs.push("भाग 2(4): यूनिकोड सक्षम लैपटॉप कुल लैपटॉप से अधिक नहीं हो सकते।");
            
            const pubsTotal = num(data.b2_publications_total);
            const pubsHindi = num(data.b2_publications_hindi);
            const pubsEng  = num(data.b2_publications_eng);
            if (pubsHindi + pubsEng > pubsTotal) errs.push("भाग 2(9): हिंदी और अंग्रेजी प्रकाशनों का योग कुल प्रकाशनों से अधिक नहीं हो सकता।");
            
            const booksTotal = num(data.b2_books_expenditure);
            const booksHindi = num(data.b2_books_hindiExpenditure);
            if (booksHindi > booksTotal) errs.push("भाग 2(10): हिंदी पुस्तकों पर व्यय कुल व्यय से अधिक नहीं हो सकता।");
        }
        return errs;
      }, [data, showPart2]);

      const handleSubmit = () => {
        if(validationErrors.length > 0) return;

        const report = { ...data, timestamp:new Date().toISOString() };
        if (!report.sectionName) report.sectionName = user.name; 

        if (!initialData) {
            report.status = "PENDING_AAO";
            report.timeline = [{ ts:new Date().toISOString(), role:"SECTION", name:user.name, action:"रिपोर्ट जमा की और AAO को भेजी", remark:"" }];
        } else {
            if (user.role === "SECTION" && report.status === "AAO_RETURNED") report.status = "PENDING_AAO";
            if (user.role === "AAO" && report.status === "SAO_RETURNED") report.status = "AAO_APPROVED";
            report.timeline = [...(report.timeline||[]), { ts:new Date().toISOString(), role:user.role, name:user.name, action:"रिपोर्ट में संशोधन किया गया (Edited)", remark:"" }];
        }
        
        onSave(report); 
        setDone(true);
      };

      if (done) return (
        <div style={{ textAlign:"center", padding:"60px 20px", background:"#fff", borderRadius:20, border:"2px solid #d1fae5" }}>
          <div style={{ fontSize:56 }}>🎉</div>
          <h2 style={{ fontSize:20, fontWeight:800, color:"#065f46", margin:"16px 0 8px" }}>
             {initialData ? "रिपोर्ट सफलतापूर्वक अपडेट होकर आगे भेज दी गई है!" : "रिपोर्ट AAO के पास भेज दी गई है!"}
          </h2>
          <div style={{ fontSize:18, fontWeight:800, color:"#6366f1", background:"#eef2ff", display:"inline-block", padding:"8px 20px", borderRadius:10 }}>{data.ackId}</div>
          <br/>
          {initialData && <button onClick={onCancel} style={{marginTop: 20, padding: "10px 20px", background: "#f1f5f9", borderRadius: 8, cursor: "pointer", border: "1px solid #cbd5e1", fontWeight: "bold", color: "#475569"}}>← वापस जाएँ</button>}
        </div>
      );

      const steps = ["कार्यालय विवरण","भाग-I",...(showPart2?["भाग-II"]:[]),"पूर्वावलोकन"];

      return (
        <div style={{ maxWidth:800, margin:"0 auto" }}>
          <div className="no-print" style={{ background:"#fff", borderRadius:14, padding:"14px 20px", marginBottom:18, border:"1.5px solid #e2e8f0" }}>
            <div style={{ display:"flex", marginBottom:8 }}>
              {steps.map((s,i)=>(
                <div key={i} onClick={()=>i<step&&setStep(i)} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3, cursor:i<step?"pointer":"default" }}>
                  <div style={{ width:34, height:34, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, border:"2px solid", background: i===step?"#6366f1": i<step?"#d1fae5":"#f8fafc", borderColor: i===step?"#6366f1": i<step?"#10b981":"#e2e8f0" }}>{i<step?"✓":i+1}</div>
                  <span style={{ fontSize:10, color: i===step?"#6366f1":i<step?"#10b981":"#94a3b8", fontWeight:i===step?700:400, textAlign:"center" }}>{s}</span>
                </div>
              ))}
            </div>
            <div style={{ height:4, background:"#f1f5f9", borderRadius:4 }}><div style={{ height:4, background:"linear-gradient(90deg,#6366f1,#8b5cf6)", borderRadius:4, width:`${(step/(totalSteps-1))*100}%`, transition:"width 0.3s" }} /></div>
          </div>

          {/* Steps 0,1,2,3 as before – omitted for brevity but identical to previous version */}
          {step===0 && ( /* ... office info ... */ )}
          {step===1 && ( /* ... Part I ... */ )}
          {step===2 && showPart2 && ( /* ... Part II ... */ )}
          
          {((step===2&&!showPart2)||(step===3&&showPart2)) && (
            <div className="no-print" style={{ background:"#fff", borderRadius:16, padding:24, border:"1.5px solid #e2e8f0", marginBottom:16 }}>
              <h3 style={{ fontSize:15, fontWeight:800, margin:"0 0 16px", color:"#1e293b" }}>👁️ पूर्वावलोकन एवं प्रमाण-पत्र</h3>
              
              {validationErrors.length > 0 && (
                <div style={{ background:"#fee2e2", borderRadius:12, padding:16, border:"1.5px solid #ef4444", marginBottom:16 }}>
                  <h4 style={{ color:"#991b1b", margin:"0 0 8px", fontSize:14, fontWeight:800 }}>⚠️ कृपया फॉर्म जमा करने से पहले निम्नलिखित गलतियाँ सुधारें:</h4>
                  <ul style={{ margin:0, paddingLeft:20, color:"#7f1d1d", fontSize:13, fontWeight:600 }}>
                    {validationErrors.map((e,i)=><li key={i} style={{marginBottom:4}}>{e}</li>)}
                  </ul>
                </div>
              )}

              {/* 🌟 Target Review Card */}
              <TargetReview report={data} />

              <div style={{ background:"#f8fafc", borderRadius:12, padding:16, border:"1px solid #e2e8f0", fontSize:13, color:"#475569", lineHeight:1.8, marginBottom:16, marginTop:16 }}>
                <strong>प्रमाण-पत्र:</strong> मैं यह प्रमाणित करता/करती हूं कि इस रिपोर्ट में दी गई सूचना उपलब्ध अभिलेखों के आधार पर बनाई गई है तथा पूर्णतया सत्य है।
              </div>
              <button 
                onClick={handleSubmit} 
                disabled={validationErrors.length > 0}
                style={{ width:"100%", padding:"14px 0", borderRadius:14, border:"none", cursor: validationErrors.length > 0 ? "not-allowed" : "pointer", background: validationErrors.length > 0 ? "#cbd5e1" : "linear-gradient(135deg,#6366f1,#8b5cf6)", color:"#fff", fontWeight:800, fontSize:15, boxShadow: validationErrors.length > 0 ? "none" : "0 6px 20px rgba(99,102,241,0.4)" }}
              >
                {initialData ? "✅ रिपोर्ट अपडेट करें (और आगे भेजें)" : "✅ रिपोर्ट अंतिम रूप से जमा करें"}
              </button>
            </div>
          )}

          <div className="no-print" style={{ display:"flex", justifyContent:"space-between", marginTop:18 }}>
            <button onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0} style={{ padding:"9px 22px", borderRadius:10, border:"1.5px solid #e2e8f0", background:step===0?"#f8fafc":"#fff", color:step===0?"#cbd5e1":"#475569", cursor:step===0?"not-allowed":"pointer", fontWeight:700, fontSize:13 }}>← पिछला</button>
            {step<totalSteps-1&&(
              <button 
                onClick={()=>setStep(s=>s+1)} 
                disabled={step===0 && alreadySubmitted} 
                style={{ padding:"9px 22px", borderRadius:10, border:"none", background:(step===0 && alreadySubmitted) ? "#cbd5e1" : "linear-gradient(135deg,#6366f1,#8b5cf6)", color:"#fff", cursor:(step===0 && alreadySubmitted) ? "not-allowed" : "pointer", fontWeight:700, fontSize:13 }}
              >अगला →</button>
            )}
          </div>
        </div>
      );
    }

    // ---------- ConsolidatedView with Section Gap Analysis ----------
    function ConsolidatedView({ reports, sectionsList }) {
      const [q, setQ] = useState("Q4");
      const [y, setY] = useState("2026");
      const [excludedSections, setExcludedSections] = useState([]);
      const [auditErrors, setAuditErrors] = useState(null); 

      const reportsForPeriod = reports.filter(r => r.quarter === q && r.year === y);
      const availableSections = Array.from(new Set(reportsForPeriod.map(r => r.sectionName)));

      useEffect(() => {
        setExcludedSections([]);
        setAuditErrors(null);
      }, [q, y]);

      const handleToggle = (sec) => {
        if (excludedSections.includes(sec)) {
          setExcludedSections(excludedSections.filter(s => s !== sec));
        } else {
          setExcludedSections([...excludedSections, sec]);
        }
      };

      const handleSelectAll = () => setExcludedSections([]);
      const handleDeselectAll = () => setExcludedSections(availableSections);

      const filtered = reportsForPeriod.filter(r => !excludedSections.includes(r.sectionName));
      
      const runAudit = () => { /* ... same as before ... */ };

      const agg = {};
      filtered.forEach(r => {
        Object.keys(r).forEach(k => {
          if (k.startsWith("b1_") || k.startsWith("b2_") || k.startsWith("b11_") || k.startsWith("b12_") || k.startsWith("b13_")) {
             const v = parseFloat(r[k]);
             if (!isNaN(v)) agg[k] = (agg[k] || 0) + v;
          }
        });
      });

      const isPart2Filled = q === "Q4" && Boolean(agg.b2_s1_subOfficesTotal || agg.b2_s2_off_total || agg.b2_comp_total);

      return (
        <div style={{ maxWidth:800, margin:"0 auto" }}>
          <div className="no-print" style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
            <h2 style={{ fontSize:18, fontWeight:800, margin:0, color:"#1e293b" }}>📑 समेकित रिपोर्ट जनरेटर</h2>
            <button onClick={() => window.print()} style={{ background:"#1e293b", color:"#fff", border:"none", padding:"8px 16px", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer", boxShadow:"0 4px 10px rgba(0,0,0,0.1)" }}>
              🖨️ PDF में सेव करें / प्रिंट करें
            </button>
          </div>

          {/* Quarter/Year selection and section filter UI (same as before) */}

          {/* 🌟 Section‑wise Gap Analysis Table */}
          <SectionTargetGapAnalysis reports={reports} sectionsList={sectionsList} quarter={q} year={y} />

          {/* Print‑only consolidated document (same as before) */}
          <div className="standard-doc print-only" style={{display: 'block'}}>
            {/* ... consolidated tables including items 9 & 10 ... */}
          </div>
        </div>
      );
    }

    // ---------- Inbox with Target Warning Badges ----------
    function Inbox({ reports, user, onAction, onEdit }) {
      const r = ROLES[user.role];
      
      const visible = useMemo(()=>{
        if(user.role==="SECTION")    return reports.filter(x=>x.sectionName===user.name);
        if(user.role==="AAO")        return reports.filter(x=>["PENDING_AAO", "SAO_RETURNED"].includes(x.status) && x.sectionName===user.mappedSection);
        if(user.role==="SAO")        return reports.filter(x=>["AAO_APPROVED"].includes(x.status) && x.sectionName===user.mappedSection);
        if(user.role==="HINDI_CELL") return reports.filter(x=>x.status==="SAO_APPROVED");
        return reports;
      },[reports,user]);

      const [selected, setSelected] = useState(null);
      const [remark, setRemark]     = useState("");
      const [search, setSearch]     = useState("");

      const filtered = visible.filter(x=> !search || x.sectionName?.includes(search) || x.ackId?.includes(search));

      if(selected) return <ReportDetail report={selected} user={user} remark={remark} setRemark={setRemark} onAction={(action,rem)=>{ onAction(selected,action,rem); setSelected(null); setRemark(""); }} onBack={()=>{ setSelected(null); setRemark(""); }} onEdit={onEdit} />;

      return (
        <div style={{ background:"#fff", borderRadius:18, border:"1.5px solid #e2e8f0", overflow:"hidden" }}>
          <div style={{ background:r.grad, padding:"16px 22px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <h2 style={{ fontSize:15, fontWeight:800, margin:0, color:"#fff" }}>{user.role==="SECTION" ? "📋 मेरी रिपोर्टें" : "📥 आवक रिपोर्टें"}</h2>
          </div>
          <div style={{ padding:"12px 16px", background:"#f8fafc", borderBottom:"1px solid #e2e8f0" }}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 अनुभाग या पावती संख्या से खोजें..." style={{ width:"100%", boxSizing:"border-box", padding:"8px 12px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:13 }} />
          </div>
          {filtered.length===0?(
            <div style={{ textAlign:"center", padding:48, color:"#94a3b8" }}>
              <div style={{ fontSize:40 }}>{user.role==="SECTION"?"📂":"📭"}</div>
              <div style={{ marginTop:10, fontSize:14 }}>{user.role==="SECTION" ? "अभी तक कोई रिपोर्ट नहीं।" : "अभी कोई रिपोर्ट प्रतीक्षा में नहीं।"}</div>
            </div>
          ):(
            filtered.map((rep,i)=>{
              const st   = STATUS[rep.status]||STATUS.DRAFT;
              const c    = SECTION_COLORS[i%SECTION_COLORS.length];
              
              // 🌟 Evaluate target achievement for warning badge
              const evalResult = evaluateReportAgainstTargets(rep);
              const hasTargetGap = !evalResult.overallAchieved;
              
              const canAct = (user.role==="SECTION"&&rep.status==="AAO_RETURNED") || (user.role==="AAO"&&["PENDING_AAO", "SAO_RETURNED"].includes(rep.status)) || (user.role==="SAO"&&rep.status==="AAO_APPROVED") || (user.role==="HINDI_CELL"&&rep.status==="SAO_APPROVED");
              return (
                <div key={rep.id} onClick={()=>setSelected(rep)} style={{ display:"flex", alignItems:"center", gap:12, padding:"14px 20px", borderBottom:"1px solid #f1f5f9", cursor:"pointer", transition:"background 0.15s" }} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                  <div style={{ width:40, height:40, borderRadius:12, background:c.bg, border:`1.5px solid ${c.border}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>{c.icon}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#1e293b", display:"flex", alignItems:"center", gap:6 }}>
                      {rep.sectionName}
                      {hasTargetGap && <span style={{ fontSize:10, background:"#fee2e2", color:"#b91c1c", padding:"2px 6px", borderRadius:10, fontWeight:700 }}>⚠️ लक्ष्य अधूरे</span>}
                    </div>
                    <div style={{ fontSize:10, color:"#94a3b8" }}>{(QUARTERS.find(q=>q.id===rep?.quarter)?.label) || rep?.quarter || ''} · {rep.year} · {rep.ackId}</div>
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
                    <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20, background:st.bg, color:st.color, border:`1px solid ${st.color}40`, whiteSpace:"nowrap" }}>{st.icon} {st.label}</span>
                  </div>
                  {canAct && <span style={{ fontSize:11, background:r.color, color:"#fff", padding:"4px 10px", borderRadius:10, fontWeight:700, flexShrink:0 }}>कार्रवाई करें</span>}
                </div>
              );
            })
          )}
        </div>
      );
    }

    // ---------- OfficialPrintView, ReportDetail, MasterControl, App remain largely the same ----------
    // (For brevity, assume they are identical to the previous corrected version)

    function App() {
      const [user, setUser]       = useState(()=>{ try { return JSON.parse(sessionStorage.getItem("rb_user_v4")); } catch { return null; } });
      const [view, setView]       = useState("dashboard");
      const [reports, setReports] = useState([]);
      const [editingReport, setEditingReport] = useState(null); 
      
      const [sectionsList, setSectionsList] = useState(DEFAULT_SECTIONS);
      const [settingsId, setSettingsId] = useState(null); 

      const clearEdit = () => setEditingReport(null);

      useEffect(() => {
        const unsubscribe = db.collection("reports").onSnapshot((snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          
          const settingsDoc = data.find(r => r.status === "SETTINGS" && r.sectionName === "SYSTEM_CONFIG");
          if (settingsDoc) {
             setSettingsId(settingsDoc.id);
             try { setSectionsList(JSON.parse(settingsDoc.formData).sections || DEFAULT_SECTIONS); } catch(e) {}
          } else {
             setSettingsId(null);
             setSectionsList(DEFAULT_SECTIONS);
          }

          const validReports = data.filter(r => r.status !== "SETTINGS");
          validReports.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
          setReports(validReports);
        });
        return () => unsubscribe();
      }, []);

      const handleLogin = u => { setUser(u); sessionStorage.setItem("rb_user_v4", JSON.stringify(u)); };
      const handleLogout = () => { setUser(null); sessionStorage.removeItem("rb_user_v4"); setView("dashboard"); };

      const handleSave = (report) => {
        const reportToSave = { ...report }; 
        const docId = reportToSave.id;
        delete reportToSave.id; 
        
        if (docId) {
          db.collection("reports").doc(docId).update(reportToSave).then(() => {});
        } else {
          db.collection("reports").add(reportToSave).then(() => {});
        }
      };

      const handleAction = (report, action, remark) => {
        const timelineEntry = { ts:new Date().toISOString(), role:user.role, name:user.name, action:action, remark };
        db.collection("reports").doc(report.id).update({ status: action, timeline: [...(report.timeline||[]), timelineEntry] });
      };

      if(!user) return <LoginScreen onLogin={handleLogin} sectionsList={sectionsList} />;

      return (
        <div style={{ minHeight:"100vh", background:"#f8fafc", fontFamily:"'Noto Sans Devanagari','Inter',sans-serif" }}>
          
          <div className="no-print" style={{ background: "#fefcbf", color: "#975a16", padding: "8px 16px", fontSize: "13px", fontWeight: "700", borderBottom: "1px solid #fef08a", display: "flex", alignItems: "center" }}>
            <span style={{ marginRight: "10px", fontSize: "16px" }}>📢</span>
            <div className="marquee-container">
              <div className="marquee-content">रिपोर्ट भरने की अंतिम तिथि तिमाही समाप्ति से आगामी माह की 5 तारीख है। कृपया रिपोर्ट समय पर प्रस्तुत करें।</div>
            </div>
          </div>

          <Navbar user={user} view={view} setView={setView} onLogout={handleLogout} clearEdit={clearEdit} />
          <main style={{ maxWidth:960, margin:"0 auto", padding:"24px 16px 80px" }}>
            {view==="dashboard" && <Dashboard reports={reports} user={user} setView={setView} sectionsList={sectionsList} />}
            {view==="form" && <ReportForm key={editingReport ? editingReport.id : 'new'} onSave={handleSave} user={user} reports={reports} initialData={editingReport} onCancel={() => { setEditingReport(null); setView(user.role === "HINDI_CELL" ? "master" : "inbox"); }} />}
            {view==="inbox"     && <Inbox reports={reports} user={user} onAction={handleAction} onEdit={(r) => { setEditingReport(r); setView("form"); }} />}
            {view==="consolidated" && <ConsolidatedView reports={reports} sectionsList={sectionsList} />}
            {view==="master" && user.role==="HINDI_CELL" && <MasterControl reports={reports} sectionsList={sectionsList} settingsId={settingsId} onEditReport={(r) => { setEditingReport(r); setView("form"); }} />}
          </main>
          <footer className="no-print" style={{ position:"fixed", bottom:0, left:0, right:0, background:"linear-gradient(90deg,#1e1b4b,#312e81)", padding:"7px 22px", display:"flex", justifyContent:"space-between", fontSize:10, color:"rgba(255,255,255,0.5)" }}>
            <span>© 2026 Digital India · राजभाषा QPR v5.0 (Annual Targets)</span>
            <span>पश्चिम रेलवे</span>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
