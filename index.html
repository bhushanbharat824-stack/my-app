    function ls(k, d = null) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } }
    function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

    const auditLog = {
      add(user, action, details) {
        const logs = ls(AUDIT_KEY, []);
        lsSet(AUDIT_KEY, [{ id: Date.now(), ts: new Date().toISOString(), user: user.name, role: user.role, action, details }, ...logs].slice(0, 1000));
      },
      getAll: () => ls(AUDIT_KEY, []),
      clear:  () => localStorage.removeItem(AUDIT_KEY),
    };

    function genId() { return `RAJ-${Date.now().toString(36).toUpperCase().slice(-7)}`; }

    function computeScore(r) {
      if (!r) return 0;
      const total6 = (parseFloat(r.b1_s6_ka_total)||0) + (parseFloat(r.b1_s6_kha_total)||0) + (parseFloat(r.b1_s6_ga_total)||0);
      const hindi6 = (parseFloat(r.b1_s6_ka_hindi)||0) + (parseFloat(r.b1_s6_kha_hindi)||0) + (parseFloat(r.b1_s6_ga_hindi)||0);
      const corrPct   = total6 > 0 ? hindi6 / total6 : 0;
      const total7    = parseFloat(r.b1_s7_totalPages) || 0;
      const hindi7    = parseFloat(r.b1_s7_hindiPages) || 0;
      const notingPct = total7 > 0 ? hindi7 / total7 : 0;
      const workshops = Math.min(parseFloat(r.b1_s8_workshops)||0, 4) / 4;
      return Math.round((corrPct*0.40 + notingPct*0.30 + workshops*0.15 + (r.b1_s9_meetingDate?1:0)*0.10 + (r.b1_s10_meetingDate?1:0)*0.05)*100);
    }

    function scoreStatus(s) {
      if (s >= 75) return { label:"उत्कृष्ट",      bg:"#d1fae5", border:"#10b981", text:"#065f46" };
      if (s >= 50) return { label:"संतोषजनक",      bg:"#fef3c7", border:"#f59e0b", text:"#92400e" };
      return             { label:"सुधार आवश्यक",   bg:"#fee2e2", border:"#ef4444", text:"#991b1b" };
    }

    function fmtDt(iso) { return iso ? new Date(iso).toLocaleString("hi-IN") : "—"; }

    // ── Tiny UI ──────────────────────────────────────────────────────────────────
    const Inp = ({ label, value, onChange, type="text", placeholder="" }) => (
      <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
        {label && <label style={{ fontSize:11, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:"0.04em" }}>{label}</label>}

          <thead><tr>{headers.map((h,i)=><th key={i} style={{ padding:"7px 8px", background:"#f8fafc", border:"1px solid #e2e8f0", fontSize:10, fontWeight:700, color:"#475569", textAlign:"center" }}>{h}</th>)}</tr></thead>

            ))}</tr>

        </table>
      </div>
    );

    // ── Workflow pipeline display ─────────────────────────────────────────────────
    function WorkflowPipeline({ currentRole, reportStatus }) {
      const steps = [
        { role:"SECTION",    label:"अनुभाग",        icon:"🏢" },
        { role:"AAO",        label:"AAO",            icon:"🔎" },
        { role:"SAO",        label:"SAO",            icon:"✅" },
        { role:"HINDI_CELL", label:"हिंदी प्रकोष्ठ", icon:"🏛️" },
      ];
      const roleOrder = ["SECTION","AAO","SAO","HINDI_CELL"];
      const currentIdx = roleOrder.indexOf(currentRole);

      return (
        <div style={{ display:"flex", alignItems:"center", gap:0, padding:"10px 0" }}>
          {steps.map((s,i)=>{
            const active = s.role === currentRole;
            const done   = i < currentIdx;
            const r      = ROLES[s.role];
            return (
              <div key={s.role} style={{ display:"flex", alignItems:"center", flex:1 }}>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", flex:1, gap:4 }}>
                  <div style={{ width:40, height:40, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, border:"2.5px solid", background: active ? r.color : done ? "#d1fae5" : "#f1f5f9", borderColor: active ? r.color : done ? "#10b981" : "#e2e8f0", boxShadow: active ? `0 0 0 4px ${r.color}30` : "none", transition:"all 0.3s", }}>{done ? "✓" : s.icon}</div>
                  <span style={{ fontSize:10, fontWeight: active?700:400, color: active?r.color : done?"#10b981":"#94a3b8", textAlign:"center" }}>{s.label}</span>
                </div>
                {i < steps.length-1 && (<div style={{ height:3, flex:0.4, background: i<currentIdx?"#10b981":"#e2e8f0", borderRadius:2, transition:"background 0.3s" }} />)}
              </div>
            );
          })}
        </div>
      );
    }

    // ── LOGIN ────────────────────────────────────────────────────────────────────
    function LoginScreen({ onLogin }) {
      const [step, setStep]       = useState("choice");
      const [section, setSection] = useState("");
      const [pass, setPass]       = useState("");
      const [err, setErr]         = useState("");

      const roleCards = [
        { role:"SECTION",    step:"section", desc:"रिपोर्ट भरें और AAO को भेजें" },
        { role:"AAO",        step:"aao",     desc:"अनुभाग की रिपोर्ट जाँचें और SAO को भेजें" },
        { role:"SAO",        step:"sao",     desc:"AAO की अनुशंसा स्वीकृत करें और आगे भेजें" },
        { role:"HINDI_CELL", step:"hindi",   desc:"SAO से आई रिपोर्ट अंतिम रूप से स्वीकार करें" },
      ];

      const tryLogin = (role, name) => {
        const pw = PASSWORDS[role];
        if (pw && pass !== pw) { setErr("❌ गलत पासवर्ड"); return; }
        onLogin({ role, name: name || ROLES[role].label });
      };

      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#1e1b4b 0%,#312e81 40%,#4c1d95 70%,#7c3aed 100%)", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div style={{ width:"100%", maxWidth:480 }}>
            <div style={{ textAlign:"center", marginBottom:28 }}>
              <div style={{ fontSize:54, marginBottom:10 }}>🏛️</div>
              <h1 style={{ fontSize:26, fontWeight:800, color:"#fff", margin:"0 0 4px", letterSpacing:"-0.5px" }}>राजभाषा पोर्टल</h1>
              <p style={{ fontSize:12, color:"rgba(255,255,255,0.65)", margin:0 }}>तिमाही प्रगति रिपोर्ट · अनुलग्नक-2</p>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:6, marginTop:16, background:"rgba(255,255,255,0.1)", backdropFilter:"blur(8px)", borderRadius:40, padding:"8px 20px" }}>
                {["🏢 अनुभाग","→","🔎 AAO","→","✅ SAO","→","🏛️ हिंदी प्रकोष्ठ"].map((t,i)=>(<span key={i} style={{ fontSize: t==="→"?16:11, color: t==="→"?"rgba(255,255,255,0.4)":"rgba(255,255,255,0.85)", fontWeight:600 }}>{t}</span>))}
              </div>
            </div>
            <div style={{ background:"rgba(255,255,255,0.97)", borderRadius:24, padding:28, boxShadow:"0 24px 60px rgba(0,0,0,0.3)" }}>
              {step==="choice" && (
                <div>
                  <p style={{ fontSize:13, fontWeight:700, color:"#64748b", margin:"0 0 16px" }}>अपनी भूमिका चुनें:</p>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {roleCards.map(rc=>{
                      const r = ROLES[rc.role];
                      return (
                        <button key={rc.role} onClick={()=>{ setStep(rc.step); setErr(""); setPass(""); }} style={{ display:"flex", alignItems:"center", gap:14, padding:"14px 18px", borderRadius:14, border:"none", background:r.grad, color:"#fff", cursor:"pointer", textAlign:"left", boxShadow:"0 4px 14px rgba(0,0,0,0.12)", transition:"transform 0.15s" }} onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
                          <span style={{ fontSize:30, flexShrink:0 }}>{r.icon}</span>
                          <div><div style={{ fontWeight:800, fontSize:15 }}>{r.label}</div><div style={{ fontSize:11, opacity:0.85, marginTop:2 }}>{rc.desc}</div></div>
                          <span style={{ marginLeft:"auto", fontSize:18, opacity:0.7 }}>→</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
              {step==="section" && (
                <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4 }}>
                    <span style={{ fontSize:28 }}>🏢</span><div><div style={{ fontSize:16, fontWeight:800, color:"#1e293b" }}>अनुभाग प्रवेश</div><div style={{ fontSize:11, color:"#94a3b8" }}>रिपोर्ट भरें और AAO को भेजें</div></div>
                  </div>
                  <div>
                    <label style={{ fontSize:11, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:"0.04em", display:"block", marginBottom:6 }}>अपना अनुभाग चुनें</label>
                    <select value={section} onChange={e=>{setSection(e.target.value); setErr("");}} style={{ width:"100%", padding:"10px 14px", borderRadius:10, border:"1.5px solid #e2e8f0", fontSize:14, outline:"none" }}>
                      <option value="">-- अनुभाग चुनें --</option>
                      {SECTIONS_LIST.map(s=><option key={s}>{s}</option>)}
                    </select>
                  </div>
                  {err && <ErrBox msg={err} />}
                  <BtnPrimary grad={ROLES.SECTION.grad} onClick={()=>{ if(!section){setErr("❌ कृपया अनुभाग चुनें"); return;} onLogin({role:"SECTION",name:section}); }}>प्रवेश करें →</BtnPrimary>
                  <BackBtn onClick={()=>{setStep("choice"); setErr(""); setSection("");}} />
                </div>
              )}
              {step==="aao" && <PwdLogin role="AAO" pass={pass} setPass={setPass} err={err} setErr={setErr} onLogin={()=>tryLogin("AAO")} onBack={()=>{setStep("choice"); setPass(""); setErr("");}} />}
              {step==="sao" && <PwdLogin role="SAO" pass={pass} setPass={setPass} err={err} setErr={setErr} onLogin={()=>tryLogin("SAO")} onBack={()=>{setStep("choice"); setPass(""); setErr("");}} />}
              {step==="hindi" && <PwdLogin role="HINDI_CELL" pass={pass} setPass={setPass} err={err} setErr={setErr} onLogin={()=>tryLogin("HINDI_CELL")} onBack={()=>{setStep("choice"); setPass(""); setErr("");}} />}
            </div>
            <p style={{ textAlign:"center", fontSize:10, color:"rgba(255,255,255,0.4)", marginTop:14 }}>Digital India · QPR v4.0 · अनुलग्नक-2 (संशोधित)</p>
          </div>
        </div>
      );
    }

    function PwdLogin({ role, pass, setPass, err, setErr, onLogin, onBack }) {
      const r = ROLES[role];
      return (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4 }}>
            <span style={{ fontSize:28 }}>{r.icon}</span><div><div style={{ fontSize:16, fontWeight:800, color:"#1e293b" }}>{r.label} प्रवेश</div><div style={{ fontSize:11, color:"#94a3b8" }}>{r.labelEn} Login</div></div>
          </div>
          <div>
            <label style={{ fontSize:11, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:"0.04em", display:"block", marginBottom:6 }}>पासवर्ड</label>
            <input type="password" value={pass} onChange={e=>{setPass(e.target.value); setErr("");}} onKeyDown={e=>e.key==="Enter"&&onLogin()} placeholder="पासवर्ड दर्ज करें..." autoFocus style={{ width:"100%", boxSizing:"border-box", padding:"10px 14px", borderRadius:10, border:"1.5px solid #e2e8f0", fontSize:14, outline:"none" }} onFocus={e=>e.target.style.borderColor=r.color} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
          </div>
          {err && <ErrBox msg={err} />}
          <BtnPrimary grad={r.grad} onClick={onLogin}>लॉगिन करें →</BtnPrimary>
          <BackBtn onClick={onBack} />
        </div>
      );
    }
    function ErrBox({ msg }) { return <div style={{ fontSize:12, color:"#dc2626", background:"#fee2e2", padding:"8px 12px", borderRadius:8 }}>{msg}</div>; }
    function BtnPrimary({ grad, onClick, children }) { return <button onClick={onClick} style={{ padding:"12px 0", borderRadius:12, border:"none", cursor:"pointer", background:grad, color:"#fff", fontWeight:800, fontSize:14, boxShadow:"0 4px 14px rgba(0,0,0,0.15)" }}>{children}</button>; }
    function BackBtn({ onClick }) { return <button onClick={onClick} style={{ background:"none", border:"none", color:"#94a3b8", fontSize:12, cursor:"pointer" }}>← वापस</button>; }

    // ── NAVBAR ───────────────────────────────────────────────────────────────────
    function Navbar({ user, view, setView, onLogout }) {
      const r = ROLES[user.role];
      const tabs = [
        { id:"dashboard", icon:"📊", label:"डैशबोर्ड" },
        ...(user.role==="SECTION" ? [{ id:"form", icon:"📝", label:"नई रिपोर्ट" }] : []),
        { id:"inbox", icon:"📥", label: user.role==="SECTION" ? "मेरी रिपोर्टें" : "आवक रिपोर्टें" },
        ...(user.role==="HINDI_CELL" ? [{ id:"audit", icon:"🔍", label:"ऑडिट" }] : []),
      ];
      return (
        <nav className="no-print" style={{ background:r.grad, padding:"0 20px", display:"flex", alignItems:"center", justifyContent:"space-between", height:56, position:"sticky", top:0, zIndex:200, boxShadow:`0 2px 16px ${r.color}60` }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:22 }}>🏛️</span><div><div style={{ fontSize:13, fontWeight:800, color:"#fff", lineHeight:1 }}>राजभाषा QPR</div><div style={{ fontSize:9, color:"rgba(255,255,255,0.65)", letterSpacing:"0.06em" }}>अनुलग्नक-2 · संशोधित</div></div>
          </div>
          <div style={{ display:"flex", gap:4 }}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setView(t.id)} style={{ display:"flex", alignItems:"center", gap:5, padding:"6px 12px", borderRadius:10, cursor:"pointer", fontSize:12, border:"none", fontWeight:600, transition:"all 0.15s", background: view===t.id ? "rgba(255,255,255,0.22)" : "transparent", color: view===t.id ? "#fff" : "rgba(255,255,255,0.7)", }}>
                <span style={{ fontSize:15 }}>{t.icon}</span><span>{t.label}</span>
              </button>
            ))}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ background:"rgba(255,255,255,0.18)", borderRadius:20, padding:"4px 12px", fontSize:11, color:"#fff", fontWeight:700 }}>{r.icon} {user.name}</div>
            <button onClick={onLogout} style={{ fontSize:11, color:"#fecaca", background:"rgba(220,38,38,0.2)", border:"1px solid rgba(220,38,38,0.35)", borderRadius:8, padding:"5px 10px", cursor:"pointer", fontWeight:700 }}>बाहर</button>
          </div>
        </nav>
      );
    }

    // ── DASHBOARD ────────────────────────────────────────────────────────────────
    function Dashboard({ reports, user, setView }) {
      const r          = ROLES[user.role];
      const isDue      = new Date().getDate() <= 5;
      const myReports  = user.role==="SECTION" ? reports.filter(x=>x.sectionName===user.name) : reports;

      const inboxCount = {
        AAO:        reports.filter(x=>x.status==="PENDING_AAO").length,
        SAO:        reports.filter(x=>x.status==="AAO_APPROVED").length,
        HINDI_CELL: reports.filter(x=>x.status==="SAO_APPROVED").length,
      };
      const pendingForMe = inboxCount[user.role] || 0;

      const stats = [
        { label:"मेरी रिपोर्टें",  value: myReports.length,        icon:"📄", c:"#6366f1" },
        { label:"लंबित",            value: pendingForMe,            icon:"⏳", c:"#f59e0b" },
        { label:"स्वीकृत",        value: myReports.filter(x=>x.status==="SUBMITTED").length, icon:"✅", c:"#10b981" },
        { label:"वापस आई",        value: myReports.filter(x=>["AAO_RETURNED","SAO_RETURNED"].includes(x.status)).length, icon:"↩️", c:"#ef4444" },
      ];

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
          {isDue && (
            <div style={{ background:"#fef3c7", border:"2px solid #f59e0b", borderRadius:14, padding:"14px 20px", display:"flex", gap:12, alignItems:"center" }}>
              <span style={{ fontSize:28 }}>⚠️</span>
              <div><div style={{ fontWeight:800, color:"#92400e", fontSize:14 }}>समय सीमा निकट!</div><div style={{ fontSize:12, color:"#b45309" }}>इस माह की 5 तारीख तक रिपोर्ट जमा अनिवार्य है।</div></div>
            </div>
          )}

          <div style={{ background:"#fff", borderRadius:16, padding:"16px 20px", border:"1.5px solid #e2e8f0" }}>
            <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", marginBottom:10, textTransform:"uppercase", letterSpacing:"0.05em" }}>रिपोर्ट प्रवाह</div>
            <WorkflowPipeline currentRole={user.role} />
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))", gap:12 }}>
            {stats.map(s=>(
              <div key={s.label} style={{ background:`${s.c}15`, borderRadius:14, padding:"16px 18px", border:`1.5px solid ${s.c}30` }}>
                <div style={{ fontSize:22 }}>{s.icon}</div><div style={{ fontSize:28, fontWeight:800, color:s.c, lineHeight:1, marginTop:4 }}>{s.value}</div><div style={{ fontSize:11, color:s.c, marginTop:4, fontWeight:600 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {user.role!=="SECTION" && pendingForMe>0 && (
            <button onClick={()=>setView("inbox")} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:r.grad, borderRadius:14, padding:"16px 22px", border:"none", cursor:"pointer", color:"#fff", boxShadow:`0 4px 18px ${r.color}40`, }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}><span style={{ fontSize:28 }}>📥</span><div style={{ textAlign:"left" }}><div style={{ fontWeight:800, fontSize:15 }}>{pendingForMe} रिपोर्ट आपकी प्रतीक्षा में</div><div style={{ fontSize:11, opacity:0.85 }}>समीक्षा करने के लिए क्लिक करें</div></div></div>
              <span style={{ fontSize:22 }}>→</span>
            </button>
          )}
        </div>
      );
    }

    // ── REPORT FORM (Section only) ────────────────────────────────────────────────
    function ReportForm({ onSave, user }) {
      const [data, setData] = useState(emptyForm());
      const [step, setStep] = useState(0);
      const [done, setDone] = useState(false);
      const set = (k,v) => setData(d=>({...d,[k]:v}));
      const isQ4 = data.quarter==="Q4";
      const score = computeScore(data);
      const st    = scoreStatus(score);
      const totalSteps = isQ4 ? 4 : 3;

      const handleSubmit = () => {
        const report = { ...data, sectionName:user.name, timestamp:new Date().toISOString(), status:"PENDING_AAO", timeline:[{ ts:new Date().toISOString(), role:"SECTION", name:user.name, action:"रिपोर्ट जमा की और AAO को भेजी", remark:"" }] };
        onSave(report);
        setDone(true);
      };

      if (done) return (
        <div style={{ textAlign:"center", padding:"60px 20px", background:"#fff", borderRadius:20, border:"2px solid #d1fae5" }}>
          <div style={{ fontSize:56 }}>🎉</div>
          <h2 style={{ fontSize:20, fontWeight:800, color:"#065f46", margin:"16px 0 8px" }}>रिपोर्ट AAO के पास भेज दी गई!</h2>
          <div style={{ fontSize:13, color:"#94a3b8", marginBottom:12 }}>पावती संख्या</div>
          <div style={{ fontSize:18, fontWeight:800, color:"#6366f1", background:"#eef2ff", display:"inline-block", padding:"8px 20px", borderRadius:10 }}>{data.ackId}</div>
          <div style={{ marginTop:20, fontSize:12, color:"#64748b" }}>अब AAO आपकी रिपोर्ट की जाँच करेंगे।</div>
        </div>
      );

      const steps = ["कार्यालय विवरण","भाग-I",...(isQ4?["भाग-II"]:[]),"पूर्वावलोकन"];

      return (
        <div style={{ maxWidth:800, margin:"0 auto" }}>
          <div style={{ background:"#fff", borderRadius:14, padding:"14px 20px", marginBottom:18, border:"1.5px solid #e2e8f0" }}>
            <div style={{ display:"flex", marginBottom:8 }}>
              {steps.map((s,i)=>(
                <div key={i} onClick={()=>i<step&&setStep(i)} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3, cursor:i<step?"pointer":"default" }}>
                  <div style={{ width:34, height:34, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, border:"2px solid", background: i===step?"#6366f1": i<step?"#d1fae5":"#f8fafc", borderColor: i===step?"#6366f1": i<step?"#10b981":"#e2e8f0" }}>{i<step?"✓":i+1}</div>
                  <span style={{ fontSize:10, color: i===step?"#6366f1":i<step?"#10b981":"#94a3b8", fontWeight:i===step?700:400, textAlign:"center" }}>{s}</span>
                </div>
              ))}
            </div>
            <div style={{ height:4, background:"#f1f5f9", borderRadius:4 }}><div style={{ height:4, background:"linear-gradient(90deg,#6366f1,#8b5cf6)", borderRadius:4, width:`${(step/(totalSteps-1))*100}%`, transition:"width 0.3s" }} /></div>
          </div>

          {step===0 && (
            <SecCard title="कार्यालय की जानकारी" icon="🏢" color={SECTION_COLORS[0]}>
              <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                <Inp label="कार्यालय का नाम और पूरा पता" value={data.officeNameAddress} onChange={v=>set("officeNameAddress",v)} placeholder="जैसे: प्र.नि.ले.प. रेलवे, मुंबई" />
                <Grid cols={3}><Inp label="अधिकारी का नाम" value={data.officerName} onChange={v=>set("officerName",v)} /><Inp label="एस.टी.डी. कोड" value={data.stdCode} onChange={v=>set("stdCode",v)} /><Inp label="फोन नं." value={data.phone} onChange={v=>set("phone",v)} /></Grid>
                <Inp label="ई-मेल" value={data.email} onChange={v=>set("email",v)} type="email" />
                <Grid cols={3}>
                  <div><label style={{ fontSize:11, fontWeight:700, color:"#475569", textTransform:"uppercase", display:"block", marginBottom:6 }}>वर्ष</label><select value={data.year} onChange={e=>set("year",e.target.value)} style={{ width:"100%", padding:"8px 12px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:13 }}>{YEARS.map(y=><option key={y}>{y}</option>)}</select></div>
                  <div><label style={{ fontSize:11, fontWeight:700, color:"#475569", textTransform:"uppercase", display:"block", marginBottom:6 }}>तिमाही</label><select value={data.quarter} onChange={e=>set("quarter",e.target.value)} style={{ width:"100%", padding:"8px 12px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:13 }}>{QUARTERS.map(q=><option key={q.id} value={q.id}>{q.label}</option>)}</select></div>
                  <Radio label="क्षेत्र" value={data.region} onChange={v=>set("region",v)} options={["A","B","C"]} />
                </Grid>
              </div>
            </SecCard>
          )}

          {step===1 && (
            <div>
              <SecCard title="1. माननीय मंत्री जी को भेजी गई फाइलें" icon="📜" color={SECTION_COLORS[0]}>
                <Grid><Num label="कुल फाइलें भेजी गईं" value={data.b1_s1_totalFiles} onChange={v=>set("b1_s1_totalFiles",v)} /><Num label="हिंदी में भेजी गईं" value={data.b1_s1_hindiFiles} onChange={v=>set("b1_s1_hindiFiles",v)} /></Grid>
              </SecCard>
              <SecCard title="2. सचिव/समकक्ष स्तर पर बैठकें/फाइलें" icon="🏛️" color={SECTION_COLORS[1]}>
                <Grid><Num label="I. कुल बैठकें" value={data.b1_s2_totalMeetings} onChange={v=>set("b1_s2_totalMeetings",v)} /><Num label="II. हिंदी में कार्यवाही" value={data.b1_s2_hindiMinutes} onChange={v=>set("b1_s2_hindiMinutes",v)} /><Num label="III. कुल कागजात" value={data.b1_s2_totalDocs} onChange={v=>set("b1_s2_totalDocs",v)} /><Num label="IV. हिंदी में कागजात" value={data.b1_s2_hindiDocs} onChange={v=>set("b1_s2_hindiDocs",v)} /></Grid>
              </SecCard>
              <SecCard title="3. धारा 3(3) के अंतर्गत जारी दस्तावेज" icon="📄" color={SECTION_COLORS[2]}>
                <Grid><Num label="(क) कुल जारी" value={data.b1_s3_totalIssued} onChange={v=>set("b1_s3_totalIssued",v)} /><Num label="(ख) द्विभाषी" value={data.b1_s3_bilingual} onChange={v=>set("b1_s3_bilingual",v)} /><Num label="(ग) केवल अंग्रेजी" value={data.b1_s3_englishOnly} onChange={v=>set("b1_s3_englishOnly",v)} /><Num label="(घ) केवल हिंदी" value={data.b1_s3_hindiOnly} onChange={v=>set("b1_s3_hindiOnly",v)} /></Grid>
              </SecCard>
              <SecCard title="6. मूल पत्राचार का ब्यौरा" icon="📨" color={SECTION_COLORS[5]}>
                <TblInput headers={["क्षेत्र","हिंदी में","अंग्रेजी में","कुल","हिंदी %"]}
                  rows={[
                    [{label:"'क' क्षेत्र"},{key:"b1_s6_ka_hindi"},{key:"b1_s6_ka_english"},{key:"b1_s6_ka_total"},{label: data.b1_s6_ka_total>0?`${Math.round((data.b1_s6_ka_hindi/data.b1_s6_ka_total)*100)||0}%`:"-"}],
                    [{label:"'ख' क्षेत्र"},{key:"b1_s6_kha_hindi"},{key:"b1_s6_kha_english"},{key:"b1_s6_kha_total"},{label: data.b1_s6_kha_total>0?`${Math.round((data.b1_s6_kha_hindi/data.b1_s6_kha_total)*100)||0}%`:"-"}],
                    [{label:"'ग' क्षेत्र"},{key:"b1_s6_ga_hindi"},{key:"b1_s6_ga_english"},{key:"b1_s6_ga_total"},{label: data.b1_s6_ga_total>0?`${Math.round((data.b1_s6_ga_hindi/data.b1_s6_ga_total)*100)||0}%`:"-"}],
                  ]} data={data} onChange={(k,v)=>set(k,v)} />
              </SecCard>
            </div>
          )}

          {step===2 && isQ4 && (
            <div>
              <div style={{ background:"#eff6ff", border:"2px solid #6366f1", borderRadius:12, padding:"10px 16px", marginBottom:14, fontSize:12, color:"#3730a3", fontWeight:700 }}>📋 भाग-II · केवल 31 मार्च को समाप्त तिमाही के साथ भरा जाए</div>
              <SecCard title="1. राजभाषा नियम,1976 · नियम 10(4) अधिसूचना" icon="📜" color={SECTION_COLORS[0]}>
                <Radio label="क्या कार्यालय अधिसूचित है?" value={data.b2_s1_notified} onChange={v=>set("b2_s1_notified",v)} options={["हाँ","नहीं"]} />
              </SecCard>
            </div>
          )}

          {((step===2&&!isQ4)||(step===3&&isQ4)) && (
            <div style={{ background:"#fff", borderRadius:16, padding:24, border:"1.5px solid #e2e8f0", marginBottom:16 }}>
              <h3 style={{ fontSize:15, fontWeight:800, margin:"0 0 16px", color:"#1e293b" }}>👁️ पूर्वावलोकन एवं प्रमाण-पत्र</h3>
              <div style={{ background:"#f8fafc", borderRadius:12, padding:16, border:"1px solid #e2e8f0", fontSize:13, color:"#475569", lineHeight:1.8, marginBottom:16 }}>
                <strong>प्रमाण-पत्र:</strong> मैं यह प्रमाणित करता/करती हूं कि इस रिपोर्ट में दी गई सूचना उपलब्ध अभिलेखों के आधार पर बनाई गई है तथा पूर्णतया सत्य है।
              </div>
              <button onClick={handleSubmit} style={{ width:"100%", padding:"14px 0", borderRadius:14, border:"none", cursor:"pointer", background:"linear-gradient(135deg,#6366f1,#8b5cf6)", color:"#fff", fontWeight:800, fontSize:15, boxShadow:"0 6px 20px rgba(99,102,241,0.4)" }}>
                ✅ रिपोर्ट अंतिम रूप से जमा करें और AAO को भेजें
              </button>
            </div>
          )}

          <div style={{ display:"flex", justifyContent:"space-between", marginTop:18 }}>
            <button onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0} style={{ padding:"9px 22px", borderRadius:10, border:"1.5px solid #e2e8f0", background:step===0?"#f8fafc":"#fff", color:step===0?"#cbd5e1":"#475569", cursor:step===0?"not-allowed":"pointer", fontWeight:700, fontSize:13 }}>← पिछला</button>
            {step<totalSteps-1&&(<button onClick={()=>setStep(s=>s+1)} style={{ padding:"9px 22px", borderRadius:10, border:"none", background:"linear-gradient(135deg,#6366f1,#8b5cf6)", color:"#fff", cursor:"pointer", fontWeight:700, fontSize:13 }}>अगला →</button>)}
          </div>
        </div>
      );
    }

    // ── INBOX (AAO / SAO / Hindi Cell) ───────────────────────────────────────────
    function Inbox({ reports, user, onAction }) {
      const r = ROLES[user.role];

      const visible = useMemo(()=>{
        if(user.role==="SECTION")    return reports.filter(x=>x.sectionName===user.name);
        if(user.role==="AAO")        return reports.filter(x=>x.status==="PENDING_AAO");
        if(user.role==="SAO")        return reports.filter(x=>["AAO_APPROVED"].includes(x.status));
        if(user.role==="HINDI_CELL") return reports.filter(x=>x.status==="SAO_APPROVED");
        return reports;
      },[reports,user]);

      const [selected, setSelected] = useState(null);
      const [remark, setRemark]     = useState("");
      const [search, setSearch]     = useState("");

      const filtered = visible.filter(x=> !search || x.sectionName?.includes(search) || x.ackId?.includes(search));

      if(selected) return <ReportDetail report={selected} user={user} remark={remark} setRemark={setRemark} onAction={(action,rem)=>{ onAction(selected,action,rem); setSelected(null); setRemark(""); }} onBack={()=>{ setSelected(null); setRemark(""); }} />;

      return (
        <div style={{ background:"#fff", borderRadius:18, border:"1.5px solid #e2e8f0", overflow:"hidden" }}>
          <div style={{ background:r.grad, padding:"16px 22px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <h2 style={{ fontSize:15, fontWeight:800, margin:0, color:"#fff" }}>{user.role==="SECTION" ? "📋 मेरी रिपोर्टें" : "📥 आवक रिपोर्टें"} — {r.label}</h2>
          </div>
          <div style={{ padding:"12px 16px", background:"#f8fafc", borderBottom:"1px solid #e2e8f0" }}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 अनुभाग या पावती संख्या से खोजें..." style={{ width:"100%", boxSizing:"border-box", padding:"8px 12px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:13 }} />
          </div>
          {filtered.length===0?(
            <div style={{ textAlign:"center", padding:48, color:"#94a3b8" }}>
              <div style={{ fontSize:40 }}>{user.role==="SECTION"?"📂":"📭"}</div>
              <div style={{ marginTop:10, fontSize:14 }}>{user.role==="SECTION" ? "अभी तक कोई रिपोर्ट नहीं।" : "अभी कोई रिपोर्ट प्रतीक्षा में नहीं।"}</div>
            </div>
          ):(
            filtered.map((rep,i)=>{
              const st   = STATUS[rep.status]||STATUS.DRAFT;
              const sc   = computeScore(rep);
              const c    = SECTION_COLORS[i%SECTION_COLORS.length];
              const canAct = (user.role==="AAO"&&rep.status==="PENDING_AAO") || (user.role==="SAO"&&rep.status==="AAO_APPROVED") || (user.role==="HINDI_CELL"&&rep.status==="SAO_APPROVED");
              return (
                <div key={rep.id} onClick={()=>setSelected(rep)} style={{ display:"flex", alignItems:"center", gap:12, padding:"14px 20px", borderBottom:"1px solid #f1f5f9", cursor:"pointer", transition:"background 0.15s" }} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                  <div style={{ width:40, height:40, borderRadius:12, background:c.bg, border:`1.5px solid ${c.border}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>{c.icon}</div>
                  <div style={{ flex:1, minWidth:0 }}><div style={{ fontSize:13, fontWeight:700, color:"#1e293b" }}>{rep.sectionName}</div><div style={{ fontSize:10, color:"#94a3b8" }}>{QUARTERS.find(q=>q.id===rep.quarter)?.label} · {rep.year} · {rep.ackId}</div></div>
                  <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
                    <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20, background:st.bg, color:st.color, border:`1px solid ${st.color}40`, whiteSpace:"nowrap" }}>{st.icon} {st.label}</span>
                  </div>
                  {canAct && <span style={{ fontSize:11, background:r.color, color:"#fff", padding:"4px 10px", borderRadius:10, fontWeight:700, flexShrink:0 }}>समीक्षा करें</span>}
                </div>
              );
            })
          )}
        </div>
      );
    }

    // ── 🖨️ REPORT DETAIL (यहाँ Print बटन जोड़ा गया है) ─────────────────────────
    function ReportDetail({ report, user, remark, setRemark, onAction, onBack }) {
      const r  = ROLES[user.role];
      const st = STATUS[report.status]||STATUS.DRAFT;
      const sc = computeScore(report);

      const canAct = (user.role==="AAO"&&report.status==="PENDING_AAO") || (user.role==="SAO"&&report.status==="AAO_APPROVED") || (user.role==="HINDI_CELL"&&report.status==="SAO_APPROVED");

      const actionBtns = {
        AAO:        [{ label:"✅ SAO को अग्रेषित करें",    action:"AAO_APPROVED",  grad:"linear-gradient(135deg,#10b981,#0ea5e9)" },{ label:"↩️ अनुभाग को वापस करें",   action:"AAO_RETURNED",  grad:"linear-gradient(135deg,#f97316,#ef4444)" }],
        SAO:        [{ label:"✅ हिंदी प्रकोष्ठ को भेजें",  action:"SAO_APPROVED",  grad:"linear-gradient(135deg,#10b981,#0ea5e9)" },{ label:"↩️ AAO को वापस करें",       action:"SAO_RETURNED",  grad:"linear-gradient(135deg,#f97316,#ef4444)" }],
        HINDI_CELL: [{ label:"🎉 अंतिम स्वीकृति दें",        action:"SUBMITTED",     grad:"linear-gradient(135deg,#f59e0b,#10b981)" },{ label:"❌ अस्वीकृत करें",          action:"REJECTED",      grad:"linear-gradient(135deg,#dc2626,#9f1239)" }],
      };

      const fieldsToShow = [
        ["कार्यालय",report.officeNameAddress||"—"],["अधिकारी",report.officerName||"—"],
        ["तिमाही",QUARTERS.find(q=>q.id===report.quarter)?.label],["वर्ष",report.year],["क्षेत्र",report.region+" क्षेत्र"],["पावती",report.ackId],
        ["1. मंत्री फाइलें (कुल/हिंदी)",`${report.b1_s1_totalFiles||0}/${report.b1_s1_hindiFiles||0}`],
        ["6. पत्राचार 'क' (कुल/हिंदी)",`${report.b1_s6_ka_total||0}/${report.b1_s6_ka_hindi||0}`],
      ];

      return (
        <div style={{ maxWidth:760, margin:"0 auto" }}>
          
          {/* 🖨️ PDF/Print बटन और Back बटन (इन्हें PDF में नहीं छापना है, इसलिए .no-print लगाया है) */}
          <div className="no-print" style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
            <button onClick={onBack} style={{ background:"none", border:"none", color:"#6366f1", cursor:"pointer", fontSize:13, fontWeight:700 }}>← वापस सूची में</button>
            <button onClick={() => window.print()} style={{ background:"#1e293b", color:"#fff", border:"none", padding:"8px 16px", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer", boxShadow:"0 4px 10px rgba(0,0,0,0.1)" }}>
              🖨️ PDF में सेव करें / प्रिंट करें
            </button>
          </div>

          {/* Header */}
          <div style={{ background:r.grad, borderRadius:16, padding:"18px 22px", marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontSize:18, fontWeight:800, color:"#fff" }}>{report.sectionName}</div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,0.8)" }}>{QUARTERS.find(q=>q.id===report.quarter)?.label} · {report.year} · {report.region} क्षेत्र</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ background:"rgba(255,255,255,0.2)", borderRadius:20, padding:"4px 14px", fontSize:13, fontWeight:700, color:"#fff" }}>{st.icon} {st.label}</div>
              <div style={{ fontSize:20, fontWeight:800, color:"#fff", marginTop:6 }}>{sc}%</div>
            </div>
          </div>

          {/* Report data */}
          <div style={{ background:"#fff", borderRadius:14, border:"1.5px solid #e2e8f0", padding:18, marginBottom:16 }}>
            <div style={{ fontSize:13, fontWeight:800, color:"#1e293b", marginBottom:12 }}>📋 मुख्य रिपोर्ट विवरण</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              {fieldsToShow.map(([k,v])=>(
                <div key={k} style={{ background:"#f8fafc", borderRadius:8, padding:"8px 10px", border:"1px solid #f1f5f9" }}>
                  <div style={{ fontSize:10, color:"#94a3b8", fontWeight:700 }}>{k}</div>
                  <div style={{ fontSize:12, color:"#1e293b", fontWeight:600 }}>{v}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Timeline */}
          {report.timeline?.length>0 && (
            <div style={{ background:"#fff", borderRadius:14, border:"1.5px solid #e2e8f0", padding:18, marginBottom:16 }}>
              <div style={{ fontSize:13, fontWeight:800, color:"#1e293b", marginBottom:12 }}>📍 रिपोर्ट यात्रा (ऑडिट ट्रेल)</div>
              {report.timeline.map((t,i)=>{
                const tr = ROLES[t.role]||{color:"#94a3b8",icon:"📌"};
                return (
                  <div key={i} style={{ display:"flex", gap:12, marginBottom:i<report.timeline.length-1?12:0 }}>
                    <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
                      <div style={{ width:32, height:32, borderRadius:"50%", background:tr.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, color:"#fff", flexShrink:0 }}>{tr.icon}</div>
                      {i<report.timeline.length-1 && <div style={{ width:2, flex:1, background:"#e2e8f0", margin:"4px 0" }} />}
                    </div>
                    <div style={{ paddingBottom:i<report.timeline.length-1?12:0 }}>
                      <div style={{ fontSize:12, fontWeight:700, color:"#1e293b" }}>{t.name} <span style={{ color:"#94a3b8", fontWeight:400 }}>({ROLES[t.role]?.label||t.role})</span></div>
                      <div style={{ fontSize:12, color:"#475569", marginTop:2 }}>{t.action}</div>
                      {t.remark && <div style={{ fontSize:11, color:"#f97316", background:"#fff7ed", padding:"4px 10px", borderRadius:6, marginTop:4, border:"1px solid #fed7aa" }}>💬 {t.remark}</div>}
                      <div style={{ fontSize:10, color:"#94a3b8", marginTop:2 }}>{fmtDt(t.ts)}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Action panel (इन्हें भी PDF में नहीं छापना है) */}
          {canAct && (
            <div className="no-print" style={{ background:"#fff", borderRadius:14, border:`2px solid ${r.color}40`, padding:20 }}>
              <div style={{ fontSize:14, fontWeight:800, color:"#1e293b", marginBottom:12 }}>{r.icon} आपकी कार्रवाई</div>
              <div style={{ marginBottom:14 }}>
                <label style={{ fontSize:11, fontWeight:700, color:"#475569", textTransform:"uppercase", display:"block", marginBottom:6 }}>टिप्पणी / कारण (वैकल्पिक)</label>
                <textarea value={remark} onChange={e=>setRemark(e.target.value)} rows={2} placeholder="यदि कोई टिप्पणी हो..." style={{ width:"100%", boxSizing:"border-box", padding:"10px 14px", borderRadius:10, border:"1.5px solid #e2e8f0", fontSize:13, resize:"vertical" }} />
              </div>
              <div style={{ display:"flex", gap:12 }}>
                {(actionBtns[user.role]||[]).map(btn=>(
                  <button key={btn.action} onClick={()=>onAction(btn.action, remark)} style={{ flex:1, padding:"12px 0", borderRadius:12, border:"none", cursor:"pointer", background:btn.grad, color:"#fff", fontWeight:800, fontSize:13, boxShadow:"0 4px 14px rgba(0,0,0,0.15)" }}>{btn.label}</button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── AUDIT ─────────────────────────────────────────────────────────────────────
    function AuditView() {
      const [logs, setLogs] = useState(auditLog.getAll());
      const icons = { LOGIN:"🔐", LOGOUT:"🚪", CREATE:"📝", ACTION:"⚡", DELETE:"🗑️" };
      return (
        <div style={{ background:"#fff", borderRadius:18, border:"1.5px solid #e2e8f0", overflow:"hidden" }}>
          <div style={{ background:"linear-gradient(135deg,#0f172a,#1e293b)", padding:"16px 22px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <h2 style={{ fontSize:15, fontWeight:800, margin:0, color:"#fff" }}>🔍 सिस्टम लॉग</h2>
          </div>
          {logs.length===0 ? <div style={{ textAlign:"center", padding:48, color:"#94a3b8" }}>कोई लॉग नहीं</div>
          : logs.map(log=>(
            <div key={log.id} style={{ display:"flex", gap:12, padding:"12px 20px", borderBottom:"1px solid #f1f5f9" }}>
              <span style={{ fontSize:20 }}>{icons[log.action]||"ℹ️"}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:700 }}>{log.user} <span style={{ fontWeight:400, color:"#64748b" }}>— {log.details}</span></div>
                <div style={{ fontSize:10, color:"#94a3b8" }}>{fmtDt(log.ts)}</div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ── ROOT ──────────────────────────────────────────────────────────────────────
    function App() {
      const [user, setUser]       = useState(()=>{ try { return JSON.parse(sessionStorage.getItem("rb_user_v4")); } catch { return null; } });
      const [view, setView]       = useState("dashboard");
      const [reports, setReports] = useState([]);

      useEffect(() => {
        const unsubscribe = db.collection("reports").onSnapshot((snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          data.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
          setReports(data);
        });
        return () => unsubscribe();
      }, []);

      const handleLogin = u => {
        setUser(u);
        sessionStorage.setItem("rb_user_v4", JSON.stringify(u));
        auditLog.add(u, "LOGIN", `${u.role} — ${u.name}`);
      };

      const handleLogout = () => {
        auditLog.add(user, "LOGOUT", "सत्र समाप्त");
        setUser(null);
        sessionStorage.removeItem("rb_user_v4");
        setView("dashboard");
      };

      const handleSave = (report) => {
        const reportToSave = { ...report };
        delete reportToSave.id; 
        db.collection("reports").add(reportToSave)
          .then(() => {
            auditLog.add(user, "CREATE", `नई रिपोर्ट ${report.ackId} — ${report.sectionName} → AAO`);
            setView("inbox");
          })
          .catch(err => alert("डेटा सेव करने में समस्या आई: " + err.message));
      };

      const handleAction = (report, action, remark) => {
        const actionLabels = {
          AAO_APPROVED:  `AAO ने स्वीकृत किया और SAO को भेजा`,
          AAO_RETURNED:  `AAO ने अनुभाग को वापस किया`,
          SAO_APPROVED:  `SAO ने स्वीकृत किया और हिंदी प्रकोष्ठ को भेजा`,
          SAO_RETURNED:  `SAO ने AAO को वापस किया`,
          SUBMITTED:     `हिंदी प्रकोष्ठ ने अंतिम रूप से स्वीकृत किया`,
          REJECTED:      `हिंदी प्रकोष्ठ ने अस्वीकृत किया`,
        };
        const timelineEntry = { ts:new Date().toISOString(), role:user.role, name:user.name, action:actionLabels[action]||action, remark };
        const newTimeline = [...(report.timeline||[]), timelineEntry];

        db.collection("reports").doc(report.id).update({
          status: action,
          timeline: newTimeline
        })
        .then(() => {
          auditLog.add(user, "ACTION", `${report.ackId} — ${actionLabels[action]||action}${remark?` · "${remark}"`:""}`);
        })
        .catch(err => alert("अपडेट करने में समस्या आई: " + err.message));
      };

      if(!user) return <LoginScreen onLogin={handleLogin} />;

      return (
        <div style={{ minHeight:"100vh", background:"#f8fafc", fontFamily:"'Noto Sans Devanagari','Inter',sans-serif" }}>
          <Navbar user={user} view={view} setView={setView} onLogout={handleLogout} />
          <main style={{ maxWidth:960, margin:"0 auto", padding:"24px 16px 80px" }}>
            {view==="dashboard" && <Dashboard reports={reports} user={user} setView={setView} />}
            {view==="form"      && user.role==="SECTION" && <ReportForm onSave={handleSave} user={user} />}
            {view==="inbox"     && <Inbox reports={reports} user={user} onAction={handleAction} />}
            {view==="audit"     && user.role==="HINDI_CELL" && <AuditView />}
          </main>
          {/* Footer को भी PDF में नहीं छापना है */}
          <footer className="no-print" style={{ position:"fixed", bottom:0, left:0, right:0, background:"linear-gradient(90deg,#1e1b4b,#312e81)", padding:"7px 22px", display:"flex", justifyContent:"space-between", fontSize:10, color:"rgba(255,255,255,0.5)", letterSpacing:"0.05em" }}>
            <span>© 2026 Digital India · राजभाषा QPR v4.0</span>
            <span>प्र.नि.ले.प. रेलवे, मुंबई</span>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err => console.log('Service Worker registration failed:', err));
    }
  </script>
</body>
</html>
