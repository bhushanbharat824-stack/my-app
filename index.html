        HINDI_CELL: reports.filter(x=>x.status==="SAO_APPROVED").length 
      };
      const pendingForMe = inboxCount[user.role] || 0;

      const [trackQ, setTrackQ] = useState("Q4");
      const [trackY, setTrackY] = useState("2026");

      const stats = [
        { label:"कुल रिपोर्टें",  value: myReports.length, icon:"📄", c:"#6366f1" },
        { label:"लंबित", value: pendingForMe, icon:"⏳", c:"#f59e0b" },
        { label:"स्वीकृत", value: myReports.filter(x=>x.status==="SUBMITTED").length, icon:"✅", c:"#10b981" },
      ];

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
          <div style={{ background:"#fff", borderRadius:16, padding:"16px 20px", border:"1.5px solid #e2e8f0" }}>
            <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", marginBottom:10 }}>रिपोर्ट प्रवाह</div>
            <WorkflowPipeline currentRole={user.role} />
          </div>

          {user.role === "HINDI_CELL" && (
            <div className="no-print" style={{ background:"#fff", borderRadius:16, padding:"20px", border:"1.5px solid #e2e8f0" }}>
              <h3 style={{ fontSize:16, fontWeight:800, margin:"0 0 14px", color:"#1e293b" }}>📊 अनुभागों की रिपोर्ट जमा स्थिति</h3>
              <div style={{ display:"flex", gap:10, marginBottom:16 }}>
                <select value={trackQ} onChange={e=>setTrackQ(e.target.value)} style={{ padding:"8px 12px", borderRadius:8, border:"1px solid #cbd5e1", outline:"none", fontSize:13, fontWeight:600 }}>
                  {QUARTERS.map(q=><option key={q.id} value={q.id}>{q.label}</option>)}
                </select>
                <select value={trackY} onChange={e=>setTrackY(e.target.value)} style={{ padding:"8px 12px", borderRadius:8, border:"1px solid #cbd5e1", outline:"none", fontSize:13, fontWeight:600 }}>
                  {YEARS.map(y=><option key={y} value={y}>{y}</option>)}
                </select>
              </div>
              
              <div style={{ fontSize:13, fontWeight:700, color:"#475569", marginBottom:12 }}>
                कुल जमा रिपोर्टें: <span style={{ color:"#10b981", fontSize:18 }}>{reports.filter(r => r.year === trackY && r.quarter === trackQ).length}</span> / {sectionsList.length}
              </div>
              
              <div style={{ display:"flex", flexWrap:"wrap", gap:10 }}>
                {sectionsList.map(sec => {
                  const hasSubmitted = reports.some(r => r.sectionName === sec && r.year === trackY && r.quarter === trackQ);
                  return (
                    <div key={sec} style={{ 
                      padding:"8px 14px", borderRadius:8, fontSize:12, fontWeight:700,
                      background: hasSubmitted ? "#f8fafc" : "#eef2ff",
                      color: hasSubmitted ? "#94a3b8" : "#3730a3",
                      border: `1px solid ${hasSubmitted ? '#e2e8f0' : '#c7d2fe'}`,
                      opacity: hasSubmitted ? 0.6 : 1, 
                      display: "flex", alignItems: "center", gap: "6px"
                    }}>
                      {sec} {hasSubmitted ? "✅" : ""}
                    </div>
                  )
                })}
              </div>
            </div>
          )}

          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))", gap:12 }}>
            {stats.map(s=>(
              <div key={s.label} style={{ background:`${s.c}15`, borderRadius:14, padding:"16px 18px", border:`1.5px solid ${s.c}30` }}>
                <div style={{ fontSize:22 }}>{s.icon}</div><div style={{ fontSize:28, fontWeight:800, color:s.c, lineHeight:1, marginTop:4 }}>{s.value}</div><div style={{ fontSize:11, color:s.c, marginTop:4, fontWeight:600 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {user.role!=="SECTION" && pendingForMe>0 && (
            <button onClick={()=>setView("inbox")} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:r.grad, borderRadius:14, padding:"16px 22px", border:"none", cursor:"pointer", color:"#fff", boxShadow:`0 4px 18px ${r.color}40`, }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}><span style={{ fontSize:28 }}>📥</span><div style={{ textAlign:"left" }}><div style={{ fontWeight:800, fontSize:15 }}>{pendingForMe} रिपोर्ट आपकी प्रतीक्षा में</div></div></div><span style={{ fontSize:22 }}>→</span>
            </button>
          )}
        </div>
      );
    }

    function ReportForm({ onSave, user, reports, initialData, onCancel }) {
      const [data, setData] = useState(initialData || emptyForm());
      const [step, setStep] = useState(0);
      const [done, setDone] = useState(false);
      const set = (k,v) => setData(d=>({...d,[k]:v}));
      
      const isQ4 = data.quarter==="Q4";
      const isHindiSection = data.sectionName === "हिंदी अनुभाग" || user.name === "हिंदी अनुभाग";
      const showPart2 = isQ4 && isHindiSection; 
      const totalSteps = showPart2 ? 4 : 3;

      const disableBasicInfo = !isHindiSection;

      const alreadySubmitted = !initialData && reports.some(r => r.sectionName === user.name && r.year === data.year && r.quarter === data.quarter);

      const validationErrors = useMemo(() => {
        const errs = [];
        const num = (v) => parseFloat(v) || 0;

        if(num(data.b1_s1_hindiFiles) > num(data.b1_s1_totalFiles)) errs.push("भाग 1(1): हिंदी फाइलें कुल फाइलों से अधिक नहीं हो सकतीं।");
        if(num(data.b1_s2_hindiMinutes) > num(data.b1_s2_totalMeetings)) errs.push("भाग 1(2): हिंदी बैठकें कुल बैठकों से अधिक नहीं हो सकतीं।");
        if(num(data.b1_s2_hindiDocs) > num(data.b1_s2_totalDocs)) errs.push("भाग 1(2): हिंदी कागजात कुल कागजातों से अधिक नहीं हो सकते।");
        
        const sum3 = num(data.b1_s3_bilingual) + num(data.b1_s3_englishOnly) + num(data.b1_s3_hindiOnly);
        if(num(data.b1_s3_totalIssued) > 0 && sum3 !== num(data.b1_s3_totalIssued)) errs.push(`भाग 1(3): जारी दस्तावेजों का योग (${sum3}) कुल (${data.b1_s3_totalIssued}) के बराबर होना चाहिए।`);

        const sum4Reply = num(data.b1_s4_hindiReply) + num(data.b1_s4_englishReply) + num(data.b1_s4_noReplyNeeded);
        if(num(data.b1_s4_totalReceived) > 0 && sum4Reply > num(data.b1_s4_totalReceived)) errs.push("भाग 1(4): कुल उत्तर दिए गए पत्र प्राप्त पत्रों से अधिक नहीं हो सकते।");

        if(num(data.b1_s6_ka_hindi) > num(data.b1_s6_ka_total)) errs.push("भाग 1(6): 'क' क्षेत्र में हिंदी पत्राचार कुल से अधिक है।");
        if(num(data.b1_s6_kha_hindi) > num(data.b1_s6_kha_total)) errs.push("भाग 1(6): 'ख' क्षेत्र में हिंदी पत्राचार कुल से अधिक है।");
        if(num(data.b1_s6_ga_hindi) > num(data.b1_s6_ga_total)) errs.push("भाग 1(6): 'ग' क्षेत्र में हिंदी पत्राचार कुल से अधिक है।");

        if(num(data.b1_s7_hindiPages) + num(data.b1_s7_engPages) !== num(data.b1_s7_totalPages) && num(data.b1_s7_totalPages) > 0) errs.push("भाग 1(7): हिंदी और अंग्रेजी पृष्ठों का योग कुल पृष्ठों के बराबर होना चाहिए।");

        if(showPart2) {
            if(num(data.b2_comp_trained) > num(data.b2_comp_total)) errs.push("भाग 2(3): प्रशिक्षित कार्मिक कुल कार्मिकों से अधिक नहीं हो सकते।");
            if(num(data.b2_comp_working) > num(data.b2_comp_trained)) errs.push("भाग 2(3): हिंदी में काम करने वाले लोग प्रशिक्षित लोगों से अधिक नहीं हो सकते।");
            if(num(data.b2_s4_unicode) > num(data.b2_s4_totalLaptops)) errs.push("भाग 2(4): यूनिकोड सक्षम लैपटॉप कुल लैपटॉप से अधिक नहीं हो सकते।");
        }
        return errs;
      }, [data, showPart2]);

      const handleSubmit = () => {
        if(validationErrors.length > 0) return;

        const report = { ...data, timestamp:new Date().toISOString() };
        if (!report.sectionName) report.sectionName = user.name; 

        if (!initialData) {
            report.status = "PENDING_AAO";
            report.timeline = [{ ts:new Date().toISOString(), role:"SECTION", name:user.name, action:"रिपोर्ट जमा की और AAO को भेजी", remark:"" }];
        } else {
            report.timeline = [...(report.timeline||[]), { ts:new Date().toISOString(), role:user.role, name:user.name, action:"रिपोर्ट में संशोधन किया गया (Edited)", remark:"" }];
        }
        
        onSave(report); 
        setDone(true);
      };

      if (done) return (
        <div style={{ textAlign:"center", padding:"60px 20px", background:"#fff", borderRadius:20, border:"2px solid #d1fae5" }}>
          <div style={{ fontSize:56 }}>🎉</div>
          <h2 style={{ fontSize:20, fontWeight:800, color:"#065f46", margin:"16px 0 8px" }}>
             {initialData ? "रिपोर्ट सफलतापूर्वक अपडेट हो गई!" : "रिपोर्ट AAO के पास भेज दी गई!"}
          </h2>
          <div style={{ fontSize:18, fontWeight:800, color:"#6366f1", background:"#eef2ff", display:"inline-block", padding:"8px 20px", borderRadius:10 }}>{data.ackId}</div>
          <br/>
          {initialData && <button onClick={onCancel} style={{marginTop: 20, padding: "10px 20px", background: "#f1f5f9", borderRadius: 8, cursor: "pointer", border: "1px solid #cbd5e1", fontWeight: "bold", color: "#475569"}}>← वापस इनबॉक्स में जाएँ</button>}
        </div>
      );

      const steps = ["कार्यालय विवरण","भाग-I",...(showPart2?["भाग-II"]:[]),"पूर्वावलोकन"];

      return (
        <div style={{ maxWidth:800, margin:"0 auto" }}>
          <div className="no-print" style={{ background:"#fff", borderRadius:14, padding:"14px 20px", marginBottom:18, border:"1.5px solid #e2e8f0" }}>
            <div style={{ display:"flex", marginBottom:8 }}>
              {steps.map((s,i)=>(
                <div key={i} onClick={()=>i<step&&setStep(i)} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3, cursor:i<step?"pointer":"default" }}>
                  <div style={{ width:34, height:34, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, border:"2px solid", background: i===step?"#6366f1": i<step?"#d1fae5":"#f8fafc", borderColor: i===step?"#6366f1": i<step?"#10b981":"#e2e8f0" }}>{i<step?"✓":i+1}</div>
                  <span style={{ fontSize:10, color: i===step?"#6366f1":i<step?"#10b981":"#94a3b8", fontWeight:i===step?700:400, textAlign:"center" }}>{s}</span>
                </div>
              ))}
            </div>
            <div style={{ height:4, background:"#f1f5f9", borderRadius:4 }}><div style={{ height:4, background:"linear-gradient(90deg,#6366f1,#8b5cf6)", borderRadius:4, width:`${(step/(totalSteps-1))*100}%`, transition:"width 0.3s" }} /></div>
          </div>

          {step===0 && (
            <div>
              {!showPart2 && (
                <div style={{ background:"#fff7ed", border:"1.5px solid #f97316", borderRadius:10, padding:"12px 16px", marginBottom:16, display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{fontSize:24}}>📌</span>
                  <div style={{ fontSize:12, color:"#9a3412", fontWeight:600 }}>राजभाषा रिपोर्ट भाग-II (वार्षिक रिपोर्ट) केवल <strong>"हिंदी अनुभाग"</strong> द्वारा <strong>Q4 (जनवरी-मार्च)</strong> में भरा जाना है। आपके लिए यह निष्क्रिय है।</div>
                </div>
              )}
              
              <SecCard 
                title={
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', width:'100%'}}>
                     <span>कार्यालय की जानकारी</span>
                     {initialData && <button onClick={(e)=>{e.stopPropagation(); onCancel();}} style={{padding:"6px 12px", background:"#fee2e2", color:"#991b1b", borderRadius:8, border:"none", cursor:"pointer", fontWeight:"bold", fontSize:11}}>❌ एडिट रद्द करें</button>}
                  </div>
                } 
                icon="🏢" color={SECTION_COLORS[0]}
              >
                <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                  <Inp label="कार्यालय का नाम और पूरा पता" value={data.officeNameAddress} onChange={v=>set("officeNameAddress",v)} placeholder="जैसे: प्र.नि.ले.प. रेलवे, मुंबई" disabled={disableBasicInfo} />
                  <Grid cols={3}>
                    <Inp label="अधिकारी का नाम" value={data.officerName} onChange={v=>set("officerName",v)} disabled={disableBasicInfo} />
                    <Inp label="एस.टी.डी. कोड" value={data.stdCode} onChange={v=>set("stdCode",v)} disabled={disableBasicInfo} />
                    <Inp label="फोन नं." value={data.phone} onChange={v=>set("phone",v)} disabled={disableBasicInfo} />
                  </Grid>
                  <Grid>
                    <Inp label="ई-मेल" value={data.email} onChange={v=>set("email",v)} type="email" disabled={disableBasicInfo} />
                    <Inp label="राजभाषा अधिकारी का फोन/ईमेल" value={data.rbOfficerPhone} onChange={v=>set("rbOfficerPhone",v)} disabled={disableBasicInfo} />
                  </Grid>
                  <Grid cols={3}>
                    <div>
                      <label style={{ fontSize:11, fontWeight:700, color:"#475569", textTransform:"uppercase", display:"block", marginBottom:6 }}>वर्ष</label>
                      <select value={data.year} onChange={e=>set("year",e.target.value)} style={{ width:"100%", padding:"8px 12px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:13 }}>
                        {YEARS.map(y=><option key={y}>{y}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{ fontSize:11, fontWeight:700, color:"#475569", textTransform:"uppercase", display:"block", marginBottom:6 }}>तिमाही</label>
                      <select value={data.quarter} onChange={e=>set("quarter",e.target.value)} style={{ width:"100%", padding:"8px 12px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:13 }}>
                        {QUARTERS.map(q=><option key={q.id} value={q.id}>{q.label}</option>)}
                      </select>
                    </div>
                    <Radio label="क्षेत्र" value={data.region} onChange={v=>set("region",v)} options={["A","B","C"]} />
                  </Grid>
                </div>
              </SecCard>

              {alreadySubmitted && (
                <div style={{ background:"#fee2e2", color:"#991b1b", padding:"14px 18px", borderRadius:10, border:"1.5px solid #ef4444", fontSize:13, fontWeight:700, marginTop:16, display:"flex", gap:10, alignItems:"center" }}>
                  <span style={{fontSize:24}}>⛔</span>
                  <div>आप <strong>{data.year}</strong> की <strong>{QUARTERS.find(q=>q.id===data.quarter)?.label}</strong> की रिपोर्ट पहले ही जमा कर चुके हैं। आप इसे दोबारा नहीं भर सकते।</div>
                </div>
              )}
            </div>
          )}

          {step===1 && (
            <div>
              <SecCard title="1. माननीय मंत्री जी को भेजी गई फाइलें" icon="📜" color={SECTION_COLORS[0]}><Grid><Num label="कुल फाइलें भेजी गईं" value={data.b1_s1_totalFiles} onChange={v=>set("b1_s1_totalFiles",v)} disabled={!isHindiSection} /><Num label="हिंदी में भेजी गईं" value={data.b1_s1_hindiFiles} onChange={v=>set("b1_s1_hindiFiles",v)} disabled={!isHindiSection} /></Grid></SecCard>
              <SecCard title="2. सचिव/समकक्ष स्तर पर बैठकें/फाइलें" icon="🏛️" color={SECTION_COLORS[1]}><Grid><Num label="I. कुल बैठकें" value={data.b1_s2_totalMeetings} onChange={v=>set("b1_s2_totalMeetings",v)} disabled={!isHindiSection} /><Num label="II. हिंदी में कार्यवाही" value={data.b1_s2_hindiMinutes} onChange={v=>set("b1_s2_hindiMinutes",v)} disabled={!isHindiSection} /><Num label="III. कुल कागजात" value={data.b1_s2_totalDocs} onChange={v=>set("b1_s2_totalDocs",v)} disabled={!isHindiSection} /><Num label="IV. हिंदी में कागजात" value={data.b1_s2_hindiDocs} onChange={v=>set("b1_s2_hindiDocs",v)} disabled={!isHindiSection} /></Grid></SecCard>
              
              <SecCard title="3. धारा 3(3) के अंतर्गत जारी दस्तावेज" icon="📄" color={SECTION_COLORS[2]}><Grid><Num label="(क) कुल जारी" value={data.b1_s3_totalIssued} onChange={v=>set("b1_s3_totalIssued",v)} /><Num label="(ख) द्विभाषी" value={data.b1_s3_bilingual} onChange={v=>set("b1_s3_bilingual",v)} /><Num label="(ग) केवल अंग्रेजी" value={data.b1_s3_englishOnly} onChange={v=>set("b1_s3_englishOnly",v)} /><Num label="(घ) केवल हिंदी" value={data.b1_s3_hindiOnly} onChange={v=>set("b1_s3_hindiOnly",v)} /></Grid></SecCard>
              <SecCard title="4. हिंदी में प्राप्त पत्र (राजभाषा नियम-5)" icon="📬" color={SECTION_COLORS[3]}><Grid><Num label="(क) कुल प्राप्त" value={data.b1_s4_totalReceived} onChange={v=>set("b1_s4_totalReceived",v)} /><Num label="(ख) उत्तर अपेक्षित नहीं" value={data.b1_s4_noReplyNeeded} onChange={v=>set("b1_s4_noReplyNeeded",v)} /><Num label="(ग) हिंदी/द्विभाषी उत्तर" value={data.b1_s4_hindiReply} onChange={v=>set("b1_s4_hindiReply",v)} /><Num label="(घ) अंग्रेजी में उत्तर" value={data.b1_s4_englishReply} onChange={v=>set("b1_s4_englishReply",v)} /></Grid></SecCard>
              <SecCard title="5. अंग्रेजी पत्रों के उत्तर हिंदी में (क/ख क्षेत्र)" icon="✉️" color={SECTION_COLORS[4]}><TblInput headers={["क्षेत्र","अंग्रेजी में प्राप्त","हिंदी में उत्तर","अंग्रेजी में उत्तर","उत्तर अपेक्षित नहीं"]} rows={[[{label:"'क' क्षेत्र"},{key:"b1_s5_ka_total"},{key:"b1_s5_ka_hindiReply"},{key:"b1_s5_ka_engReply"},{key:"b1_s5_ka_noReply"}],[{label:"'ख' क्षेत्र"},{key:"b1_s5_kha_total"},{key:"b1_s5_kha_hindiReply"},{key:"b1_s5_kha_engReply"},{key:"b1_s5_kha_noReply"}]]} data={data} onChange={(k,v)=>set(k,v)} /></SecCard>

    // ── 📑 CONSOLIDATED REPORT (WITH SECTION FILTER) ───────────────────────
    function ConsolidatedView({ reports, sectionsList }) {
      const [q, setQ] = useState("Q4");
      const [y, setY] = useState("2026");

      // 🌟 नया: किन अनुभागों को समेकित रिपोर्ट से बाहर रखना है 🌟
      const [excludedSections, setExcludedSections] = useState([]);

      const reportsForPeriod = reports.filter(r => r.quarter === q && r.year === y);
      const availableSections = Array.from(new Set(reportsForPeriod.map(r => r.sectionName)));

      // जब भी तिमाही/वर्ष बदले, तो फ़िल्टर रीसेट कर दें
      useEffect(() => {
        setExcludedSections([]);
      }, [q, y]);

      const handleToggle = (sec) => {
        if (excludedSections.includes(sec)) {
          setExcludedSections(excludedSections.filter(s => s !== sec));
        } else {
          setExcludedSections([...excludedSections, sec]);
        }
      };

      const handleSelectAll = () => setExcludedSections([]);
      const handleDeselectAll = () => setExcludedSections(availableSections);

      // फ़ाइनल रिपोर्ट जिन्हें जोड़ा जाएगा
      const filtered = reportsForPeriod.filter(r => !excludedSections.includes(r.sectionName));
      
      const agg = {};
      filtered.forEach(r => {
        Object.keys(r).forEach(k => {
          if (k.startsWith("b1_") || k.startsWith("b2_")) {
             const v = parseFloat(r[k]);
             if (!isNaN(v)) agg[k] = (agg[k] || 0) + v;
          }
        });
      });

      const fieldsToShow = [
        ["कुल जमा रिपोर्टें (चयनित अनुभाग)", filtered.length],
        ["1. मंत्री फाइलें (कुल)", agg.b1_s1_totalFiles||0],
        ["1. मंत्री फाइलें (हिंदी)", agg.b1_s1_hindiFiles||0],
        ["2. सचिव बैठकें (कुल)", agg.b1_s2_totalMeetings||0],
        ["2. हिंदी कार्यवाही", agg.b1_s2_hindiMinutes||0],
        ["3. धारा 3(3) कुल जारी", agg.b1_s3_totalIssued||0],
        ["3. धारा 3(3) द्विभाषी + हिंदी", (agg.b1_s3_bilingual||0) + (agg.b1_s3_hindiOnly||0)],
        ["4. प्राप्त पत्र कुल", agg.b1_s4_totalReceived||0],
        ["4. हिंदी में उत्तर", agg.b1_s4_hindiReply||0],
        ["6. पत्राचार 'क' क्षेत्र (कुल)", agg.b1_s6_ka_total||0],
        ["6. पत्राचार 'क' क्षेत्र (हिंदी)", agg.b1_s6_ka_hindi||0],
        ["6. पत्राचार 'ख' क्षेत्र (कुल)", agg.b1_s6_kha_total||0],
        ["6. पत्राचार 'ख' क्षेत्र (हिंदी)", agg.b1_s6_kha_hindi||0],
        ["6. पत्राचार 'ग' क्षेत्र (कुल)", agg.b1_s6_ga_total||0],
        ["6. पत्राचार 'ग' क्षेत्र (हिंदी)", agg.b1_s6_ga_hindi||0],

    function Inbox({ reports, user, onAction, onEdit }) {
      const r = ROLES[user.role];
      
      const visible = useMemo(()=>{
        if(user.role==="SECTION")    return reports.filter(x=>x.sectionName===user.name);
        if(user.role==="AAO")        return reports.filter(x=>x.status==="PENDING_AAO" && x.sectionName===user.mappedSection);
        if(user.role==="SAO")        return reports.filter(x=>["AAO_APPROVED"].includes(x.status) && x.sectionName===user.mappedSection);
        if(user.role==="HINDI_CELL") return reports.filter(x=>x.status==="SAO_APPROVED");
        return reports;
      },[reports,user]);

      const [selected, setSelected] = useState(null);
      const [remark, setRemark]     = useState("");
      const [search, setSearch]     = useState("");

      const filtered = visible.filter(x=> !search || x.sectionName?.includes(search) || x.ackId?.includes(search));

      if(selected) return <ReportDetail report={selected} user={user} remark={remark} setRemark={setRemark} onAction={(action,rem)=>{ onAction(selected,action,rem); setSelected(null); setRemark(""); }} onBack={()=>{ setSelected(null); setRemark(""); }} onEdit={onEdit} />;

      return (
        <div style={{ background:"#fff", borderRadius:18, border:"1.5px solid #e2e8f0", overflow:"hidden" }}>
          <div style={{ background:r.grad, padding:"16px 22px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <h2 style={{ fontSize:15, fontWeight:800, margin:0, color:"#fff" }}>{user.role==="SECTION" ? "📋 मेरी रिपोर्टें" : "📥 आवक रिपोर्टें"}</h2>
          </div>
          <div style={{ padding:"12px 16px", background:"#f8fafc", borderBottom:"1px solid #e2e8f0" }}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 अनुभाग या पावती संख्या से खोजें..." style={{ width:"100%", boxSizing:"border-box", padding:"8px 12px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:13 }} />
          </div>
          {filtered.length===0?(
            <div style={{ textAlign:"center", padding:48, color:"#94a3b8" }}>
              <div style={{ fontSize:40 }}>{user.role==="SECTION"?"📂":"📭"}</div>
              <div style={{ marginTop:10, fontSize:14 }}>{user.role==="SECTION" ? "अभी तक कोई रिपोर्ट नहीं।" : "अभी कोई रिपोर्ट प्रतीक्षा में नहीं।"}</div>
            </div>
          ):(
            filtered.map((rep,i)=>{
              const st   = STATUS[rep.status]||STATUS.DRAFT;
              const c    = SECTION_COLORS[i%SECTION_COLORS.length];
              const canAct = (user.role==="AAO"&&rep.status==="PENDING_AAO") || (user.role==="SAO"&&rep.status==="AAO_APPROVED") || (user.role==="HINDI_CELL"&&rep.status==="SAO_APPROVED");
              return (
                <div key={rep.id} onClick={()=>setSelected(rep)} style={{ display:"flex", alignItems:"center", gap:12, padding:"14px 20px", borderBottom:"1px solid #f1f5f9", cursor:"pointer", transition:"background 0.15s" }} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                  <div style={{ width:40, height:40, borderRadius:12, background:c.bg, border:`1.5px solid ${c.border}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>{c.icon}</div>
                  <div style={{ flex:1, minWidth:0 }}><div style={{ fontSize:13, fontWeight:700, color:"#1e293b" }}>{rep.sectionName}</div><div style={{ fontSize:10, color:"#94a3b8" }}>{QUARTERS.find(q=>q.id===rep.quarter)?.label} · {rep.year} · {rep.ackId}</div></div>
                  <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
                    <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20, background:st.bg, color:st.color, border:`1px solid ${st.color}40`, whiteSpace:"nowrap" }}>{st.icon} {st.label}</span>
                  </div>
                  {canAct && <span style={{ fontSize:11, background:r.color, color:"#fff", padding:"4px 10px", borderRadius:10, fontWeight:700, flexShrink:0 }}>समीक्षा करें</span>}
                </div>
              );
            })
          )}
        </div>
      );
    }

    // 🌟 मास्टर कंट्रोल (Admin Panel) Firebase के लिए 🌟
    function MasterControl({ reports, sectionsList, settingsId }) {
      const [isClearing, setIsClearing] = useState(false);
      const [newSec, setNewSec] = useState("");

      const handleReset = async () => {
        const pass = prompt("⚠️ डेंजर ज़ोन: क्या आप सच में सिस्टम की सभी रिपोर्ट डिलीट करना चाहते हैं?\nपुष्टि के लिए कैपिटल में 'RESET' टाइप करें:");
        if(pass !== "RESET") return;

        setIsClearing(true);
        try {
          for (let r of reports) {
            if (r.status !== "SETTINGS") {
               await db.collection("reports").doc(r.id).delete();
            }
          }
          alert("✅ सिस्टम पूरी तरह से रीसेट हो गया है! सारा पुराना डेटा मिटा दिया गया है।");
        } catch(e) {
          alert("Error deleting: " + e.message);
        }
        setIsClearing(false);
      };

      const handleSaveSettings = async (newList) => {
        setIsClearing(true);
        try {
          const rowData = { sectionName: "SYSTEM_CONFIG", status: "SETTINGS", formData: JSON.stringify({ sections: newList }) };
          
          if (settingsId) {
             await db.collection("reports").doc(settingsId).update(rowData);
          } else {
             await db.collection("reports").add(rowData);
          }
        } catch(e) {
          alert("Error saving sections: " + e.message);
        }
        setIsClearing(false);
      };

      const handleAdd = () => {
        if(!newSec.trim()) return;
        if(sectionsList.includes(newSec.trim())) { alert("यह अनुभाग पहले से मौजूद है!"); return; }
        const updated = [...sectionsList, newSec.trim()];
        handleSaveSettings(updated);
        setNewSec("");
      };

      const handleDel = (sec) => {
        if(!window.confirm(`क्या आप सच में '${sec}' को मास्टर लिस्ट से हटाना चाहते हैं?`)) return;
        const updated = sectionsList.filter(s => s !== sec);
        handleSaveSettings(updated);
      };

      return (
         <div style={{ display: "flex", flexDirection: "column", gap: 24, maxWidth:800, margin:"0 auto" }}>
            <div style={{ background: "#fff", border: "1.5px solid #e2e8f0", borderRadius: 16, padding: 24 }}>
               <h2 style={{ color: "#1e293b", margin: "0 0 16px 0", fontSize: 18, fontWeight: 800 }}>⚙️ अनुभाग प्रबंधन (Master Data)</h2>
               <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
                  <input value={newSec} onChange={e=>setNewSec(e.target.value)} placeholder="नए अनुभाग का नाम टाइप करें..." style={{ flex: 1, padding: "10px 14px", borderRadius: 10, border: "1.5px solid #cbd5e1", outline: "none", fontSize: 14 }} />
                  <button onClick={handleAdd} disabled={isClearing} style={{ background: "#6366f1", color: "#fff", border: "none", padding: "0 24px", borderRadius: 10, fontWeight: "bold", cursor: isClearing ? "not-allowed" : "pointer", fontSize: 14 }}>+ जोड़ें</button>
               </div>
               
               <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 12 }}>
                  {sectionsList.map(s => (
                     <div key={s} style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 10, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13, fontWeight: 700, color: "#475569" }}>
                        <span>{s}</span>
                        <button onClick={()=>handleDel(s)} disabled={isClearing} style={{ background: "none", border: "none", color: "#ef4444", cursor: isClearing ? "not-allowed" : "pointer", fontSize: 20, lineHeight: 1 }}>×</button>
                     </div>
                  ))}
               </div>
            </div>

            <div style={{ background: "#fee2e2", border: "2px solid #ef4444", borderRadius: 16, padding: 24 }}>
               <h2 style={{ color: "#991b1b", margin: "0 0 10px 0", fontSize: 18, fontWeight: 800 }}>⚠️ डेंजर ज़ोन (मास्टर रीसेट)</h2>
               <p style={{ color: "#7f1d1d", fontSize: 13, marginBottom: 20 }}>यह बटन सिस्टम से सभी अनुभागों की जमा की गई <b>सभी रिपोर्टों को हमेशा के लिए</b> डिलीट कर देगा। इसका इस्तेमाल केवल नए वित्तीय वर्ष / नई तिमाही (Quarter) को बिल्कुल फ्रेश शुरू करने से पहले करें।</p>
               <button onClick={handleReset} disabled={isClearing} style={{ background: "#dc2626", color: "#fff", border: "none", padding: "12px 24px", borderRadius: 10, fontWeight: "bold", cursor: isClearing ? "not-allowed" : "pointer", display: "flex", alignItems: "center", gap: 8, fontSize: 14 }}>
                  <span style={{ fontSize: 18 }}>🗑️</span> {isClearing ? "डेटा मिटाया जा रहा है..." : "पूरा सिस्टम रीसेट करें (Delete All Data)"}
               </button>
            </div>
         </div>
      )
    }

    function App() {
      const [user, setUser]       = useState(()=>{ try { return JSON.parse(sessionStorage.getItem("rb_user_v4")); } catch { return null; } });
      const [view, setView]       = useState("dashboard");
      const [reports, setReports] = useState([]);
      const [editingReport, setEditingReport] = useState(null); 
      
      const [sectionsList, setSectionsList] = useState(DEFAULT_SECTIONS);
      const [settingsId, setSettingsId] = useState(null); 

      const clearEdit = () => setEditingReport(null);

      useEffect(() => {
        const unsubscribe = db.collection("reports").onSnapshot((snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          
          const settingsDoc = data.find(r => r.status === "SETTINGS" && r.sectionName === "SYSTEM_CONFIG");
          if (settingsDoc) {
             setSettingsId(settingsDoc.id);
             try { setSectionsList(JSON.parse(settingsDoc.formData).sections || DEFAULT_SECTIONS); } catch(e) {}
          } else {
             setSettingsId(null);
             setSectionsList(DEFAULT_SECTIONS);
          }

          const validReports = data.filter(r => r.status !== "SETTINGS");
          validReports.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
          setReports(validReports);
        });
        return () => unsubscribe();
      }, []);

      const handleLogin = u => { setUser(u); sessionStorage.setItem("rb_user_v4", JSON.stringify(u)); };
      const handleLogout = () => { setUser(null); sessionStorage.removeItem("rb_user_v4"); setView("dashboard"); };

      const handleSave = (report) => {
        const reportToSave = { ...report }; 
        const docId = reportToSave.id;
        delete reportToSave.id; 
        
        if (docId) {
          db.collection("reports").doc(docId).update(reportToSave).then(() => {});
        } else {
          db.collection("reports").add(reportToSave).then(() => {});
        }
      };

      const handleAction = (report, action, remark) => {
        const timelineEntry = { ts:new Date().toISOString(), role:user.role, name:user.name, action:action, remark };
        db.collection("reports").doc(report.id).update({ status: action, timeline: [...(report.timeline||[]), timelineEntry] });
      };

      if(!user) return <LoginScreen onLogin={handleLogin} sectionsList={sectionsList} />;

      return (
        <div style={{ minHeight:"100vh", background:"#f8fafc", fontFamily:"'Noto Sans Devanagari','Inter',sans-serif" }}>
          
          <div className="no-print" style={{ background: "#fefcbf", color: "#975a16", padding: "8px 16px", fontSize: "13px", fontWeight: "700", borderBottom: "1px solid #fef08a", display: "flex", alignItems: "center" }}>
            <span style={{ marginRight: "10px", fontSize: "16px" }}>📢</span>
            <marquee scrollamount="5">रिपोर्ट भरने की अंतिम तिथि तिमाही समाप्ति से आगामी माह की 5 तारीख है। कृपया रिपोर्ट समय पर प्रस्तुत करें।</marquee>
          </div>

          <Navbar user={user} view={view} setView={setView} onLogout={handleLogout} clearEdit={clearEdit} />
          <main style={{ maxWidth:960, margin:"0 auto", padding:"24px 16px 80px" }}>
            {view==="dashboard" && <Dashboard reports={reports} user={user} setView={setView} sectionsList={sectionsList} />}
            
            {view==="form" && <ReportForm key={editingReport ? editingReport.id : 'new'} onSave={handleSave} user={user} reports={reports} initialData={editingReport} onCancel={() => { setEditingReport(null); setView("inbox"); }} />}
            
            {view==="inbox"     && <Inbox reports={reports} user={user} onAction={handleAction} onEdit={(r) => { setEditingReport(r); setView("form"); }} />}
            {view==="consolidated" && <ConsolidatedView reports={reports} sectionsList={sectionsList} />}
            
            {view==="master" && user.role==="HINDI_CELL" && <MasterControl reports={reports} sectionsList={sectionsList} settingsId={settingsId} />}
          </main>
          <footer className="no-print" style={{ position:"fixed", bottom:0, left:0, right:0, background:"linear-gradient(90deg,#1e1b4b,#312e81)", padding:"7px 22px", display:"flex", justifyContent:"space-between", fontSize:10, color:"rgba(255,255,255,0.5)" }}>
            <span>© 2026 Digital India · राजभाषा QPR v4.0</span>
            <span>पश्चिम रेलवे</span>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
