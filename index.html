  <style>
    @media screen { .print-only { display: none !important; } }
    body { font-family: 'Noto Sans Devanagari', sans-serif; background: #f8fafc; }
    
    /* DOLA Official Style for Reports */
    .standard-doc { 
       width: 100%; line-height: 1.4; color: #000; 
       font-family: 'Noto Sans Devanagari', 'Times New Roman', serif; 
       background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #cbd5e1;
       box-shadow: 0 4px 20px rgba(0,0,0,0.08); box-sizing: border-box;
    }
    .standard-doc table { width: 100%; border-collapse: collapse; margin-bottom: 20px; border: 1px solid #000; }
    .standard-doc th, .standard-doc td { border: 1px solid #000; padding: 8px 10px; text-align: left; vertical-align: middle; font-size: 10.5pt; color: #000; }
    .standard-doc th { font-weight: bold; text-align: center; background-color: #f2f2f2 !important; }
    .standard-doc h2 { text-align: center; font-size: 15pt; margin: 0 0 8px 0; color: #000; font-weight: bold; text-decoration: underline; }
    .standard-doc h3 { text-align: center; font-size: 13pt; margin: 0 0 25px 0; color: #000; font-weight: normal; }
    .standard-doc h4 { font-size: 12pt; margin: 25px 0 12px 0; color: #000; text-decoration: underline; font-weight: bold; background: #f1f5f9; padding: 6px; }
    .standard-doc .field-title { font-weight: bold; margin: 15px 0 6px 0; display: block; font-size: 11pt; }

    @media print {

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // 🛡️ CRASH PROTECTION ENGINE 🛡️
    const safeStr = (v, fallback = "") => {
      if (v === null || v === undefined) return fallback;
      if (typeof v === 'object') return fallback;
      return String(v);
    };

    const formatDate = (ds) => { 
      if(!ds) return '-'; 
      const d = new Date(ds); 
      return isNaN(d.getTime()) ? '-' : d.toLocaleDateString('en-GB'); 
    };

    const ROLES = {
      SECTION:    { id: "SECTION",    label: "अनुभाग",        icon: "🏢", color: "#6366f1", grad: "linear-gradient(135deg,#6366f1,#8b5cf6)" },
      AAO:        { id: "AAO",        label: "AAO",            icon: "🔎", color: "#0ea5e9", grad: "linear-gradient(135deg,#0ea5e9,#6366f1)" },
      SAO:        { id: "SAO",        label: "SAO",            icon: "✅", color: "#10b981", grad: "linear-gradient(135deg,#10b981,#0ea5e9)" },
      HINDI_CELL: { id: "HINDI_CELL", label: "हिंदी प्रकोष्ठ", icon: "🏛️", color: "#f59e0b", grad: "linear-gradient(135deg,#f59e0b,#ef4444)" },
    };
    const PASSWORDS = { AAO: "AAO@2025", SAO: "SAO@2025", HINDI_CELL: "HINDI@2025" };
    const STATUS = {
      DRAFT: { id: "DRAFT", label: "मसौदा", icon: "📝", color: "#94a3b8", bg: "#f8fafc" },
      PENDING_AAO: { id: "PENDING_AAO", label: "AAO के पास", icon: "⏳", color: "#6366f1", bg: "#eef2ff" },
      AAO_APPROVED: { id: "AAO_APPROVED", label: "AAO स्वीकृत", icon: "✔️", color: "#0ea5e9", bg: "#f0f9ff" },
      AAO_RETURNED: { id: "AAO_RETURNED", label: "AAO ने वापस किया", icon: "↩️", color: "#f97316", bg: "#fff7ed" },
      PENDING_SAO: { id: "PENDING_SAO", label: "SAO के पास", icon: "⏳", color: "#10b981", bg: "#ecfdf5" },
      SAO_APPROVED: { id: "SAO_APPROVED", label: "SAO स्वीकृत", icon: "✔️", color: "#10b981", bg: "#d1fae5" },
      SAO_RETURNED: { id: "SAO_RETURNED", label: "SAO ने वापस किया", icon: "↩️", color: "#f97316", bg: "#fff7ed" },
      SUBMITTED: { id: "SUBMITTED", label: "हिंदी प्रकोष्ठ स्वीकृत", icon: "🎉", color: "#16a34a", bg: "#dcfce7" },
    };

    const FIELD_LABELS_HINDI = {
      officeNameAddress: "कार्यालय का नाम व पता", officerName: "अधिकारी का नाम", stdCode: "एस.टी.डी. कोड", phone: "फोन नं.", email: "ई-मेल", region: "क्षेत्र",
      b1_s1_totalFiles: "1. कुल फाइलें (मंत्री जी को)", b1_s1_hindiFiles: "1. हिंदी में फाइलें", b1_s3_totalIssued: "3(क). कुल जारी दस्तावेज", b1_s3_bilingual: "3(ख). द्विभाषी",
      b1_s4_totalReceived: "4(क). हिंदी में कुल प्राप्त", b1_s6_ka_total: "6. कुल पत्राचार ('क')", b1_s6_ka_hindi: "6. हिंदी पत्राचार ('क')",
    };

    const DEFAULT_SECTIONS = ["आंतरिक लेखापरीक्षा", "सवनि I", "सवनि II", "समन्वय", "निरीक्षण", "संगणक", "भंडार एवं निविदा", "स्थापना व व्यय", "एलएपी लोअर परेल", "रिपोर्ट अनुभाग", "मुंबई सेंट्रल आरएपी", "एमआरवीसी", "बुक्स व बजट", "प्रशिक्षण", "प्रशासन", "वड़ोदरा मंडल", "भावनगर मंडल", "राजकोट मंडल", "अहमदाबाद मंडल", "रतलाम मंडल", "हिंदी अनुभाग"];
    const QUARTERS = [{ id: "Q1", label: "Q1 · अप्रैल–जून" },{ id: "Q2", label: "Q2 · जुलाई–सितंबर" },{ id: "Q3", label: "Q3 · अक्टूबर–दिसंबर" },{ id: "Q4", label: "Q4 · जनवरी–मार्च" }];
    const YEARS = ["2024","2025","2026","2027"];
    const SECTION_COLORS = [{ bg:"#ede9fe", border:"#8b5cf6", text:"#5b21b6", icon:"📜" },{ bg:"#fce7f3", border:"#ec4899", text:"#9d174d", icon:"🏛️" },{ bg:"#fee2e2", border:"#ef4444", text:"#991b1b", icon:"📄" },{ bg:"#fff7ed", border:"#f97316", text:"#9a3412", icon:"📬" },{ bg:"#fefce8", border:"#eab308", text:"#854d0e", icon:"✉️" }];

    // --- GENERIC UI HELPERS ---
    const Inp = ({ label, value, onChange, type="text", disabled=false }) => (
      <div className="flex flex-col gap-1">
        {label && <label className="text-[10px] font-bold text-slate-500 uppercase">{label}</label>}
        <input type={type} value={safeStr(value)} onChange={e=>onChange(e.target.value)} disabled={disabled} className="p-2 border border-slate-200 rounded-lg text-sm outline-none focus:border-indigo-500 disabled:bg-slate-50" />
      </div>
    );
    const Num = ({ label, value, onChange, disabled=false }) => (
      <div className="flex flex-col gap-1">
        {label && <label className="text-[10px] font-bold text-slate-600 leading-tight">{label}</label>}
        <input type="number" min="0" value={safeStr(value)} onChange={e=>onChange(e.target.value)} disabled={disabled} className="p-2 border border-slate-200 rounded-lg text-sm font-bold disabled:bg-slate-50" />
      </div>
    );
    const Radio = ({ label, value, onChange, options, disabled=false }) => (
      <div className="flex flex-col gap-2">
        {label && <label className="text-[10px] font-bold text-slate-500 uppercase">{label}</label>}
        <div className="flex gap-2">
          {options.map(o=>(<button key={o} onClick={()=>onChange(o)} disabled={disabled} className={`px-3 py-1 rounded-full text-xs font-bold border transition-all ${value===o ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>{o}</button>))}
        </div>
      </div>
    );
    const SecCard = ({ title, icon, color, children }) => {
      const [open, setOpen] = useState(true);
      return (
        <div className="mb-4 border rounded-xl overflow-hidden shadow-sm" style={{borderColor: color.border}}>
          <div className="no-print p-3 flex justify-between items-center cursor-pointer select-none" style={{background: color.bg}} onClick={()=>setOpen(!open)}>
            <div className="flex items-center gap-2"><span className="text-xl">{icon}</span><span className="text-sm font-bold" style={{color: color.text}}>{title}</span></div>
            <span style={{color: color.text}}>{open ? '▼' : '▶'}</span>
          </div>
          {open && <div className="p-4 bg-white">{children}</div>}
        </div>
      );
    };

    // --- 📊 ANNUAL REVIEW MODAL ---
    function AnnualReviewReport({ report, onClose }) {
      if (!report) return null;
      const region = safeStr(report.region, 'A');
      const num = (v) => parseFloat(v) || 0;
      
      const sec33Pct = num(report.b1_s3_totalIssued) > 0 ? Math.round(((num(report.b1_s3_bilingual)+num(report.b1_s3_hindiOnly))/num(report.b1_s3_totalIssued))*100) : 100;
      const notingTarget = region === 'A' ? 75 : region === 'B' ? 50 : 30;
      const notingPct = num(report.b1_s7_totalPages) > 0 ? Math.round((num(report.b1_s7_hindiPages)/num(report.b1_s7_totalPages))*100) : 0;
      const corrTarget = region === 'A' ? 100 : region === 'B' ? 90 : 55;
      const corrTotal = num(report.b1_s6_ka_total) + num(report.b1_s6_kha_total) + num(report.b1_s6_ga_total);
      const corrHindi = num(report.b1_s6_ka_hindi) + num(report.b1_s6_kha_hindi) + num(report.b1_s6_ga_hindi);
      const corrPct = corrTotal > 0 ? Math.round((corrHindi/corrTotal)*100) : 0;

      return (
        <div className="fixed inset-0 bg-slate-900/80 z-[9999] flex justify-center items-center p-4">
          <div className="standard-doc max-w-3xl w-full max-h-[90vh] overflow-y-auto relative">
            <button onClick={onClose} className="no-print absolute top-4 right-4 bg-red-500 text-white w-8 h-8 rounded-full font-bold">✕</button>
            <h2 className="mt-8">राजभाषा वार्षिक कार्यक्रम (2025-26) समीक्षा रिपोर्ट</h2>
            <h3 className="font-bold underline">अनुभाग: {safeStr(report.sectionName)} | क्षेत्र: {region}</h3>
            <table>
              <thead><tr><th>मद</th><th>निर्धारित लक्ष्य</th><th>अनुभाग उपलब्धि</th><th>स्थिति</th></tr></thead>
              <tbody>
                <tr><td>धारा 3(3) का अनुपालन</td><td>100%</td><td>{sec33Pct}%</td><td>{sec33Pct >= 100 ? '✅' : '❌'}</td></tr>
                <tr><td>मूल पत्राचार</td><td>{corrTarget}%</td><td>{corrPct}%</td><td>{corrPct >= corrTarget ? '✅' : '❌'}</td></tr>
                <tr><td>फाइल टिप्पण</td><td>{notingTarget}%</td><td>{notingPct}%</td><td>{notingPct >= notingTarget ? '✅' : '❌'}</td></tr>
              </tbody>
            </table>
            <div className="mt-10 text-right"><p className="font-bold">प्रभारी अधिकारी (राजभाषा)</p></div>
          </div>
        </div>
      );
    }

    // --- 📑 CONSOLIDATED VIEW ---
    function ConsolidatedView({ reports }) {
      const [selQ, setSelQ] = useState("Q4");
      const [selY, setSelY] = useState("2026");
      const filtered = reports.filter(r => safeStr(r.year) === selY && safeStr(r.quarter) === selQ && safeStr(r.status) === "SUBMITTED");
      const sum = (key) => filtered.reduce((acc, curr) => acc + (parseFloat(curr[key]) || 0), 0);

      return (
        <div className="standard-doc" style={{boxShadow: 'none'}}>
          <div className="no-print flex gap-3 mb-5 bg-slate-100 p-4 rounded-xl items-center">
            <select value={selQ} onChange={e => setSelQ(e.target.value)} className="p-2 rounded border text-sm font-bold">
              {QUARTERS.map(q => <option key={q.id} value={q.id}>{q.label}</option>)}
            </select>
            <select value={selY} onChange={e => setSelY(e.target.value)} className="p-2 rounded border text-sm font-bold">
              {YEARS.map(y => <option key={y} value={y}>{y}</option>)}
            </select>
            <button onClick={() => window.print()} className="ml-auto bg-slate-800 text-white px-4 py-2 rounded text-sm font-bold">🖨️ समेकित रिपोर्ट प्रिंट</button>
          </div>
          <h2>तिमाही प्रगति रिपोर्ट का समेकन (Consolidated Report)</h2>
          <h3>{QUARTERS.find(q=>q.id===selQ)?.label} · वर्ष {selY}</h3>
          <p className="text-center mb-5">कुल स्वीकृत रिपोर्टें: <b>{filtered.length}</b></p>
          <table className="w-full">
            <thead><tr className="bg-slate-50"><th>मद विवरण</th><th>कुल योग (All Approved Sections)</th></tr></thead>
            <tbody>
              <tr><td>1. कुल फाइलें (मंत्री जी को प्रस्तुत)</td><td className="text-center">{sum('b1_s1_totalFiles')}</td></tr>
              <tr><td>2. हिंदी में फाइलें</td><td className="text-center">{sum('b1_s1_hindiFiles')}</td></tr>
              <tr><td>3. धारा 3(3) - कुल जारी दस्तावेज</td><td className="text-center">{sum('b1_s3_totalIssued')}</td></tr>
              <tr><td>4. धारा 3(3) - द्विभाषी जारी</td><td className="text-center">{sum('b1_s3_bilingual')}</td></tr>
              <tr><td>5. हिंदी में प्राप्त कुल पत्र</td><td className="text-center">{sum('b1_s4_totalReceived')}</td></tr>
              <tr><td>6. कुल पत्राचार (क + ख + ग)</td><td className="text-center">{sum('b1_s6_ka_total') + sum('b1_s6_kha_total') + sum('b1_s6_ga_total')}</td></tr>
              <tr><td>7. कुल हिंदी पत्राचार</td><td className="text-center">{sum('b1_s6_ka_hindi') + sum('b1_s6_kha_hindi') + sum('b1_s6_ga_hindi')}</td></tr>
            </tbody>
          </table>
          <p className="no-print text-[10px] italic text-slate-400 mt-4">* केवल 'SUBMITTED' रिपोर्टों का योग।</p>
        </div>
      );
    }

    // --- 📝 REPORT FORM (FULL) ---
    function ReportForm({ onSave, user, reports, initialData, onCancel }) {
      const [data, setData] = useState(initialData || emptyForm());
      const [step, setStep] = useState(0);
      const set = (k,v) => setData(prev=>({...prev,[k]:v}));
      
      const isQ4 = data.quarter==="Q4";
      const isHindiSection = safeStr(data.sectionName) === "हिंदी अनुभाग" || safeStr(user?.name) === "हिंदी अनुभाग";
      const showPart2 = isQ4 && isHindiSection;

      const alreadySubmitted = !initialData && reports.some(r => safeStr(r.sectionName) === safeStr(user?.name) && safeStr(r.year) === safeStr(data.year) && safeStr(r.quarter) === safeStr(data.quarter));

      const validationErrors = useMemo(() => {
        const errs = []; const num = (v) => parseFloat(v) || 0;
        if(num(data.b1_s1_hindiFiles) > num(data.b1_s1_totalFiles)) errs.push("मद 1: हिंदी फाइलें कुल से अधिक हैं।");
        const sum4 = num(data.b1_s4_hindiReply) + num(data.b1_s4_englishReply) + num(data.b1_s4_noReplyNeeded);
        if(num(data.b1_s4_totalReceived) > 0 && sum4 !== num(data.b1_s4_totalReceived)) errs.push(`मद 4: उत्तरों का योग (${sum4}) प्राप्त (${data.b1_s4_totalReceived}) से अलग है।`);
        return errs;
      }, [data]);

      return (
        <div className="max-w-3xl mx-auto pb-20">
          <div className="no-print bg-white p-4 rounded-xl shadow-sm mb-6 flex justify-between">
            {["विवरण","आँकड़े",...(showPart2?["वार्षिक"]:[]),"पूर्वावलोकन"].map((s,i)=>(
              <div key={i} className={`text-xs font-bold ${step===i?'text-indigo-600':'text-slate-300'}`}>{i+1}. {s}</div>
            ))}
          </div>

          {step===0 && (
            <SecCard title="कार्यालय विवरण" icon="🏢" color={SECTION_COLORS[0]}>
              <div className="grid gap-4">
                <Inp label="कार्यालय/अनुभाग" value={data.officeNameAddress} onChange={v=>set("officeNameAddress",v)} />
                <div className="grid grid-cols-2 gap-4">
                   <Inp label="वर्ष" value={data.year} disabled />
                   <Radio label="क्षेत्र" value={data.region} onChange={v=>set("region",v)} options={["A","B","C"]} />
                </div>
                <Inp label="अधिकारी का नाम" value={data.officerName} onChange={v=>set("officerName",v)} />
              </div>
              {alreadySubmitted && <div className="mt-4 p-2 bg-red-100 text-red-700 text-[10px] font-bold rounded">⚠️ रिपोर्ट पहले से जमा है।</div>}
            </SecCard>
          )}

          {step===1 && (
            <div className="grid gap-2">
              <SecCard title="मद 1 व 3" icon="📜" color={SECTION_COLORS[1]}>
                <div className="grid grid-cols-2 gap-4">
                  <Num label="1. कुल फाइलें" value={data.b1_s1_totalFiles} onChange={v=>set("b1_s1_totalFiles",v)} />
                  <Num label="1. हिंदी फाइलें" value={data.b1_s1_hindiFiles} onChange={v=>set("b1_s1_hindiFiles",v)} />
                  <Num label="3. कुल जारी" value={data.b1_s3_totalIssued} onChange={v=>set("b1_s3_totalIssued",v)} />
                  <Num label="3. द्विभाषी" value={data.b1_s3_bilingual} onChange={v=>set("b1_s3_bilingual",v)} />
                </div>
              </SecCard>
              <SecCard title="मद 4, 6 व 7" icon="📬" color={SECTION_COLORS[2]}>
                <div className="grid grid-cols-2 gap-4">
                  <Num label="4. कुल प्राप्त" value={data.b1_s4_totalReceived} onChange={v=>set("b1_s4_totalReceived",v)} />
                  <Num label="4. हिंदी उत्तर" value={data.b1_s4_hindiReply} onChange={v=>set("b1_s4_hindiReply",v)} />
                  <Num label="6. कुल पत्राचार" value={data.b1_s6_ka_total} onChange={v=>set("b1_s6_ka_total",v)} />
                  <Num label="6. हिंदी पत्राचार" value={data.b1_s6_ka_hindi} onChange={v=>set("b1_s6_ka_hindi",v)} />
                  <Num label="7. कुल टिप्पण पृष्ठ" value={data.b1_s7_totalPages} onChange={v=>set("b1_s7_totalPages",v)} />
                  <Num label="7. हिंदी टिप्पण पृष्ठ" value={data.b1_s7_hindiPages} onChange={v=>set("b1_s7_hindiPages",v)} />
                </div>
              </SecCard>
              <SecCard title="मद 9" icon="🤝" color={SECTION_COLORS[0]}>
                <Radio label="9(घ). कार्यसूची हिंदी में?" value={data.b1_s9_agendaHindi} onChange={v=>set("b1_s9_agendaHindi",v)} options={["हाँ","नहीं"]} />
              </SecCard>
            </div>
          )}

          {step===2 && showPart2 && (
            <SecCard title="वार्षिक आँकड़े (भाग-II)" icon="📊" color={SECTION_COLORS[3]}>
               <div className="grid grid-cols-2 gap-4">
                  <Num label="9. कुल प्रकाशन" value={data.b2_publications_total} onChange={v=>set("b2_publications_total",v)} />
                  <Num label="9. हिंदी प्रकाशन" value={data.b2_publications_hindi} onChange={v=>set("b2_publications_hindi",v)} />
                  <Num label="10. कुल पुस्तक व्यय" value={data.b2_books_expenditure} onChange={v=>set("b2_books_expenditure",v)} />
                  <Num label="10. हिंदी पुस्तक व्यय" value={data.b2_books_hindiExpenditure} onChange={v=>set("b2_books_hindiExpenditure",v)} />
               </div>
            </SecCard>
          )}

          <div className="no-print mt-6 flex justify-between items-center">
            <button onClick={()=>setStep(s=>s-1)} disabled={step===0} className="text-slate-400 font-bold">← पिछला</button>
            {validationErrors.length > 0 && <div className="text-[10px] text-red-500 font-bold max-w-[200px]">{validationErrors[0]}</div>}
            <button onClick={()=>{ if(step < (showPart2?3:2)) setStep(step+1); else onSave(data); }} disabled={validationErrors.length>0 || (step===0 && alreadySubmitted)} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg">
               {step < (showPart2?3:2) ? "अगला →" : "अंतिम जमा करें ✅"}
            </button>
          </div>
        </div>
      );
    }

    // --- 📥 INBOX & REVIEW ---
    function Inbox({ reports, user, onEdit }) {
      const visible = reports.filter(r => user.role === "HINDI_CELL" || safeStr(r.sectionName) === safeStr(user.name));
      return (
        <div className="bg-white rounded-2xl border overflow-hidden shadow-sm">
          <div className="p-4 bg-slate-800 text-white font-bold">आवक रिपोर्टें ({visible.length})</div>
          {visible.map(r => (
            <div key={r.id} onClick={()=>onEdit(r)} className="p-4 border-b hover:bg-slate-50 cursor-pointer flex justify-between items-center transition-all">
              <div>
                <div className="font-bold text-slate-800 text-sm">{safeStr(r.sectionName)}</div>
                <div className="text-[9px] text-slate-400 font-bold uppercase">{safeStr(r.quarter)} · {safeStr(r.year)} · {safeStr(r.ackId)}</div>
              </div>
              <span className="text-[9px] font-black px-2 py-1 rounded bg-slate-100" style={{color: STATUS[r.status]?.color}}>{safeStr(STATUS[r.status]?.label || r.status).toUpperCase()}</span>
            </div>
          ))}
        </div>
      );
    }

    // --- 🏛️ MASTER CONTROL ---
    function MasterControl({ reports, onEditReport, sectionsList, settingsId }) {
      const [newSec, setNewSec] = useState("");
      const valid = reports.filter(r => r.status !== "SETTINGS");
      
      const handleAdd = () => {
        if(!newSec) return;
        const updated = [...sectionsList, newSec];
        db.collection("reports").doc(settingsId).update({ formData: JSON.stringify({sections: updated}) });
        setNewSec("");
      };

      return (
        <div className="flex flex-col gap-6 pb-20">
           <div className="bg-white p-6 rounded-2xl border shadow-sm">
              <h2 className="text-lg font-black mb-4">✏️ मास्टर रिपोर्ट एडिटर</h2>
              <div className="max-h-[400px] overflow-auto border rounded-xl">
                <table className="w-full text-xs text-left">
                  <thead className="bg-slate-50 sticky top-0"><tr><th className="p-3">अनुभाग</th><th>तिमाही</th><th>कार्रवाई</th></tr></thead>
                  <tbody>
                    {valid.map(r => (
                      <tr key={r.id} className="border-b">
                        <td className="p-3 font-bold">{safeStr(r.sectionName)}</td>
                        <td>{safeStr(r.quarter)}</td>
                        <td><button onClick={()=>onEditReport(r)} className="text-amber-600 font-black">एडिट</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
           </div>
           
           <div className="bg-white p-6 rounded-2xl border shadow-sm">
              <h2 className="text-lg font-black mb-4">⚙️ अनुभाग प्रबंधन</h2>
              <div className="flex gap-2 mb-4">
                <input value={newSec} onChange={e=>setNewSec(e.target.value)} placeholder="नया अनुभाग..." className="p-2 border rounded-lg text-sm flex-1" />
                <button onClick={handleAdd} className="bg-indigo-600 text-white px-4 rounded-lg font-bold">+</button>
              </div>
              <div className="flex flex-wrap gap-2">
                {sectionsList.map(s => <span key={s} className="px-3 py-1 bg-slate-100 rounded-full text-[10px] font-bold">{safeStr(s)}</span>)}
              </div>
           </div>
        </div>
      );
    }

    // --- 🚀 MAIN APP ---
    function App() {
      const [user, setUser] = useState(() => JSON.parse(sessionStorage.getItem("rb_u_v4")));
      const [view, setView] = useState("dashboard");
      const [reports, setReports] = useState([]);
      const [editingReport, setEditingReport] = useState(null);
      const [sectionsList, setSectionsList] = useState(DEFAULT_SECTIONS);
      const [settingsId, setSettingsId] = useState(null);

      useEffect(() => {
        const unsub = db.collection("reports").onSnapshot(snap => {
          const all = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          const conf = all.find(x => x.status === "SETTINGS");
          if(conf) { setSettingsId(conf.id); setSectionsList(JSON.parse(conf.formData).sections); }
          setReports(all.filter(x=>x.status!=="SETTINGS").sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)));
        });
        return () => unsub();
      }, []);

      const handleSave = (rep) => {
        const d = {...rep}; const id = d.id; delete d.id;
        if(id) db.collection("reports").doc(id).update(d);
        else db.collection("reports").add(rep);
        setEditingReport(null); setView("inbox");
      };

      if (!user) return <LoginScreen onLogin={(u)=>{setUser(u); sessionStorage.setItem("rb_u_v4", JSON.stringify(u));}} sectionsList={sectionsList} />;

      return (
        <div className="min-h-screen bg-slate-50 font-sans">
          <nav className="no-print bg-slate-900 text-white p-4 flex justify-between items-center sticky top-0 z-50">
             <div className="flex items-center gap-2 cursor-pointer" onClick={()=>setView("dashboard")}>
                <span className="text-xl">🏛️</span><span className="font-black text-sm">राजभाषा QPR</span>
             </div>
             <div className="flex gap-4 text-[10px] font-bold uppercase tracking-widest">
                <button onClick={()=>setView("dashboard")} className={view==="dashboard"?'text-indigo-400':''}>डैशबोर्ड</button>
                {user.role==="SECTION" && <button onClick={()=>setView("form")} className={view==="form"?'text-indigo-400':''}>नया फॉर्म</button>}
                <button onClick={()=>setView("inbox")} className={view==="inbox"?'text-indigo-400':''}>इनबॉक्स</button>
                {user.role==="HINDI_CELL" && <button onClick={()=>setView("consolidated")} className={view==="consolidated"?'text-indigo-400':''}>समेकित</button>}
                {user.role==="HINDI_CELL" && <button onClick={()=>setView("master")} className={view==="master"?'text-indigo-400':''}>मास्टर</button>}
                <button onClick={()=>{setUser(null); sessionStorage.removeItem("rb_u_v4");}} className="text-red-400">बाहर</button>
             </div>
          </nav>
          
          <main className="p-6 max-w-5xl mx-auto min-h-screen">
            {view === "dashboard" && <Dashboard reports={reports} user={user} setView={setView} sectionsList={sectionsList} />}
            {view === "form" && <ReportForm reports={reports} initialData={editingReport} onSave={handleSave} user={user} onCancel={()=>setView("inbox")} />}
            {view === "inbox" && <Inbox reports={reports} user={user} onEdit={(r)=>{setEditingReport(r); setView("form");}} />}
            {view === "consolidated" && <ConsolidatedView reports={reports} />}
            {view === "master" && <MasterControl reports={reports} sectionsList={sectionsList} settingsId={settingsId} onEditReport={(r)=>{setEditingReport(r); setView("form");}} />}
          </main>
          
          <footer className="no-print bg-slate-900 text-[10px] text-slate-500 p-4 text-center border-t border-slate-800">
             © 2026 राजभाषा QPR पोर्टल · पश्चिम रेलवे · डिजिटल इंडिया
          </footer>
        </div>
      );
    }

    function LoginScreen({ onLogin, sectionsList }) {
      const [step, setStep] = useState("choice");
      const [pass, setPass] = useState("");
      const [section, setSection] = useState("");
      const [err, setErr] = useState("");

      const tryLogin = (r) => {
        if(PASSWORDS[r] && pass !== PASSWORDS[r]) { setErr("❌ गलत पासवर्ड"); return; }
        if(r === "SECTION" && !section) { setErr("❌ अनुभाग चुनें"); return; }
        onLogin({role: r, name: r === "SECTION" ? section : r, mappedSection: section});
      };

      return (
        <div className="h-screen flex items-center justify-center bg-slate-900 p-4">
          <div className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h1 className="text-2xl font-black mb-6 text-center text-slate-800">प्रवेश द्वार</h1>
            {step === "choice" ? (
              <div className="flex flex-col gap-3">
                {Object.keys(ROLES).map(r => <button key={r} onClick={()=>setStep(r)} className="p-4 rounded-2xl text-white font-bold text-sm transition-transform active:scale-95" style={{background: ROLES[r].grad}}>{ROLES[r].label}</button>)}
              </div>
            ) : (
              <div className="flex flex-col gap-4">
                {step === "SECTION" && (
                  <select value={section} onChange={e=>setSection(e.target.value)} className="p-3 border rounded-xl outline-none bg-slate-50 text-sm font-bold">
                    <option value="">-- अनुभाग चुनें --</option>
                    {sectionsList.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                )}
                <input type="password" placeholder="पासवर्ड" onChange={e=>setPass(e.target.value)} className="p-3 border rounded-xl outline-none bg-slate-50" />
                {err && <div className="text-red-500 text-[10px] font-bold">{err}</div>}
                <button onClick={()=>tryLogin(step)} className="bg-slate-800 text-white p-4 rounded-2xl font-bold">लॉगिन</button>
                <button onClick={()=>setStep("choice")} className="text-slate-400 text-xs">वापस</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
